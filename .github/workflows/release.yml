name: Release

on:
  push:
    tags:
      - "v*"

env:
  HELM_VERSION: v3.12.0

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add kong https://charts.konghq.com
          helm repo update

      - name: Install chart dependencies
        run: |
          helm dependency update ./charts/supabase

      - name: Package Helm chart
        run: |
          helm package ./charts/supabase --destination ./packages

      - name: Generate changelog
        id: changelog
        run: |
          # Get the tag name
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          # Generate changelog from commits since last tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" $PREVIOUS_TAG..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s")
          fi

          # Save changelog to file
          echo "$CHANGELOG" > CHANGELOG.txt
          echo "Generated changelog for $TAG_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.changelog.outputs.tag_name }}
          name: Release ${{ steps.changelog.outputs.tag_name }}
          body_path: CHANGELOG.txt
          files: |
            packages/*.tgz
          draft: false
          prerelease: ${{ contains(steps.changelog.outputs.tag_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push chart to GHCR
        run: |
          helm push packages/*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

  update-index:
    name: Update Helm Repository Index
    runs-on: ubuntu-latest
    needs: release
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add kong https://charts.konghq.com
          helm repo update

      - name: Install chart dependencies
        run: |
          helm dependency update ./charts/supabase

      - name: Package charts
        run: |
          mkdir -p packages
          helm package ./charts/supabase --destination ./packages

      - name: Update Helm repository index
        run: |
          # Switch to gh-pages branch or create it
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages

          # Copy packaged charts
          cp packages/*.tgz .

          # Generate index.yaml
          helm repo index . --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

          # Commit and push
          git add .
          git commit -m "Update Helm repository index" || exit 0
          git push origin gh-pages

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [release, update-index]
    if: always()
    steps:
      - name: Notify on success
        if: needs.release.result == 'success' && needs.update-index.result == 'success'
        run: |
          echo "✅ Release completed successfully!"
          echo "📦 Chart published to GitHub Releases"
          echo "🏠 Helm repository updated"
          echo "🐳 OCI package pushed to GHCR"

      - name: Notify on failure
        if: needs.release.result == 'failure' || needs.update-index.result == 'failure'
        run: |
          echo "❌ Release failed!"
          echo "Please check the workflow logs for details."
          exit 1
