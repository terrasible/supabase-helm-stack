name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  HELM_VERSION: v3.12.0
  KUBERNETES_VERSION: v1.27.0

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add kong https://charts.konghq.com
          helm repo update

      - name: Lint Helm chart
        run: |
          helm dependency update ./charts/supabase
          helm lint ./charts/supabase

      - name: Validate templates
        run: |
          helm template test ./charts/supabase --debug

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        k8s-version: ["1.25.0", "1.26.0", "1.27.0"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v${{ matrix.k8s-version }}

      - name: Create kind cluster
        uses: helm/kind-action@v1.8.0
        with:
          version: v0.20.0
          kubernetes_version: v${{ matrix.k8s-version }}
          cluster_name: supabase-test

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add kong https://charts.konghq.com
          helm repo update

      - name: Install chart dependencies
        run: |
          helm dependency update ./charts/supabase

      - name: Test chart installation
        run: |
          helm install test-supabase ./charts/supabase \
            --wait \
            --timeout=10m \
            --set postgresql.auth.postgresPassword=test123 \
            --set global.jwt.secret=super-secret-jwt-token-with-at-least-32-characters-long \
            --set global.db.password=test123

      - name: Run Helm tests
        run: |
          helm test test-supabase --timeout=5m

      - name: Check pod status
        if: failure()
        run: |
          kubectl get pods
          kubectl describe pods
          kubectl logs -l app.kubernetes.io/name=supabase --tail=100

      - name: Cleanup
        if: always()
        run: |
          helm uninstall test-supabase || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add kong https://charts.konghq.com
          helm repo update

      - name: Install chart dependencies
        run: |
          helm dependency update ./charts/supabase

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: './charts/supabase'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Install helm-docs
        run: |
          cd /tmp
          wget https://github.com/norwoodj/helm-docs/releases/download/v1.11.0/helm-docs_1.11.0_Linux_x86_64.tar.gz
          tar -xzf helm-docs_1.11.0_Linux_x86_64.tar.gz
          sudo mv helm-docs /usr/local/bin

      - name: Generate documentation
        run: |
          helm-docs --chart-search-root=charts

      - name: Check if documentation is up to date
        run: |
          if ! git diff --exit-code; then
            echo "Documentation is not up to date. Please run 'helm-docs' and commit the changes."
            exit 1
          fi
