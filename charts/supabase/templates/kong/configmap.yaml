{{- if .Values.kong.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "supabase.fullname" . }}-kong-config
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: kong
data:
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    services:
      - name: auth-service
        url: http://{{ include "supabase.fullname" . }}-auth:{{ .Values.auth.service.port }}
        routes:
          - name: auth-route
            paths:
              - /auth/v1
            strip_path: false
            plugins:
              - name: cors
                config:
                  origins:
                    - "*"
                  methods:
                    - GET
                    - HEAD
                    - PUT
                    - PATCH
                    - POST
                    - DELETE
                    - OPTIONS
                  headers:
                    - Accept
                    - Authorization
                    - Cache-Control
                    - Content-Type
                    - DNT
                    - If-Modified-Since
                    - Keep-Alive
                    - Origin
                    - User-Agent
                    - X-Requested-With
                    - apikey
                    - x-client-info
                  credentials: true

      - name: rest-service
        url: http://{{ include "supabase.fullname" . }}-rest:{{ .Values.rest.service.port }}
        routes:
          - name: rest-route
            paths:
              - /rest/v1
            strip_path: false
            plugins:
              - name: cors
                config:
                  origins:
                    - "*"
                  methods:
                    - GET
                    - HEAD
                    - PUT
                    - PATCH
                    - POST
                    - DELETE
                    - OPTIONS
                  headers:
                    - Accept
                    - Authorization
                    - Cache-Control
                    - Content-Type
                    - DNT
                    - If-Modified-Since
                    - Keep-Alive
                    - Origin
                    - User-Agent
                    - X-Requested-With
                    - apikey
                    - x-client-info
                  credentials: true

      - name: realtime-service
        url: http://{{ include "supabase.fullname" . }}-realtime:{{ .Values.realtime.service.port }}
        routes:
          - name: realtime-route
            paths:
              - /realtime/v1
            strip_path: false
            plugins:
              - name: cors
                config:
                  origins:
                    - "*"
                  methods:
                    - GET
                    - HEAD
                    - PUT
                    - PATCH
                    - POST
                    - DELETE
                    - OPTIONS
                  headers:
                    - Accept
                    - Authorization
                    - Cache-Control
                    - Content-Type
                    - DNT
                    - If-Modified-Since
                    - Keep-Alive
                    - Origin
                    - User-Agent
                    - X-Requested-With
                    - apikey
                    - x-client-info
                  credentials: true

      - name: storage-service
        url: http://{{ include "supabase.fullname" . }}-storage:{{ .Values.storage.service.port }}
        routes:
          - name: storage-route
            paths:
              - /storage/v1
            strip_path: false
            plugins:
              - name: cors
                config:
                  origins:
                    - "*"
                  methods:
                    - GET
                    - HEAD
                    - PUT
                    - PATCH
                    - POST
                    - DELETE
                    - OPTIONS
                  headers:
                    - Accept
                    - Authorization
                    - Cache-Control
                    - Content-Type
                    - DNT
                    - If-Modified-Since
                    - Keep-Alive
                    - Origin
                    - User-Agent
                    - X-Requested-With
                    - apikey
                    - x-client-info
                  credentials: true

      {{- if .Values.functions.enabled }}
      - name: functions-service
        url: http://{{ include "supabase.fullname" . }}-functions:{{ .Values.functions.service.port }}
        routes:
          - name: functions-route
            paths:
              - /functions/v1
            strip_path: false
            plugins:
              - name: cors
                config:
                  origins:
                    - "*"
                  methods:
                    - GET
                    - HEAD
                    - PUT
                    - PATCH
                    - POST
                    - DELETE
                    - OPTIONS
                  headers:
                    - Accept
                    - Authorization
                    - Cache-Control
                    - Content-Type
                    - DNT
                    - If-Modified-Since
                    - Keep-Alive
                    - Origin
                    - User-Agent
                    - X-Requested-With
                    - apikey
                    - x-client-info
                  credentials: true
      {{- end }}

      {{- if .Values.analytics.enabled }}
      - name: analytics-service
        url: http://{{ include "supabase.fullname" . }}-analytics:{{ .Values.analytics.service.port }}
        routes:
          - name: analytics-route
            paths:
              - /analytics/v1
            strip_path: false
            plugins:
              - name: cors
                config:
                  origins:
                    - "*"
                  methods:
                    - GET
                    - HEAD
                    - PUT
                    - PATCH
                    - POST
                    - DELETE
                    - OPTIONS
                  headers:
                    - Accept
                    - Authorization
                    - Cache-Control
                    - Content-Type
                    - DNT
                    - If-Modified-Since
                    - Keep-Alive
                    - Origin
                    - User-Agent
                    - X-Requested-With
                    - apikey
                    - x-client-info
                  credentials: true
      {{- end }}
{{- end }}
