{{- if and .Values.kong.enabled .Values.kongOperator.enabled }}
# Supabase Auth Service
apiVersion: configuration.konghq.com/v1
kind: KongService
metadata:
  name: {{ include "supabase.fullname" . }}-auth
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
spec:
  host: {{ include "supabase.auth.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local
  port: {{ .Values.auth.service.port }}
  protocol: http
  path: /auth/v1
  retries: 3
  connect_timeout: 5000
  write_timeout: 30000
  read_timeout: 30000

