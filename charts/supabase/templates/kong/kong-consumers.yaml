{{- if and .Values.kong.enabled .Values.kongOperator.enabled }}
# Anonymous Consumer for public access
apiVersion: configuration.konghq.com/v1
kind: KongConsumer
metadata:
  name: {{ include "supabase.fullname" . }}-anonymous
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: kong
username: anonymous
{{- end }}
