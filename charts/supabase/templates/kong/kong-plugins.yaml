{{- if and .Values.kong.enabled .Values.kongOperator.enabled }}
# JWT Authentication Plugin for all services
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: {{ include "supabase.fullname" . }}-jwt-auth
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
plugin: jwt
config:
  secret_is_base64: false
  key_claim_name: kid
  claims_to_verify:
  - exp

---
# CORS Plugin for all services
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: {{ include "supabase.fullname" . }}-cors
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
plugin: cors
config:
  origins:
  - "*"
  methods:
  - GET
  - POST
  - PUT
  - DELETE
  - PATCH
  - OPTIONS
  headers:
  - Accept
  - Accept-Version
  - Content-Length
  - Content-MD5
  - Content-Type
  - Date
  - Authorization
  - ApiKey
  exposed_headers:
  - ETag

---
# Rate Limiting Plugin
{{- if and .Values.kong.rateLimiting .Values.kong.rateLimiting.enabled }}
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: {{ include "supabase.fullname" . }}-rate-limit
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
plugin: rate-limiting
config:
  minute: {{ .Values.kong.rateLimiting.minute | default 100 }}
  hour: {{ .Values.kong.rateLimiting.hour | default 1000 }}
  day: {{ .Values.kong.rateLimiting.day | default 10000 }}
  limit_by: ip
{{- end }}

---
# Apply JWT Auth to internal services
apiVersion: configuration.konghq.com/v1
kind: KongClusterPlugin
metadata:
  name: {{ include "supabase.fullname" . }}-jwt-auth-internal
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
plugin: jwt
config:
  secret_is_base64: false
  key_claim_name: kid
  claims_to_verify:
  - exp
{{- end }}
