{{- if and .Values.meta.enabled .Values.meta.ingress .Values.meta.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "supabase.fullname" . }}-meta
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: meta
  {{- with .Values.meta.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.meta.ingress.ingressClassName }}
  ingressClassName: {{ .Values.meta.ingress.ingressClassName }}
  {{- end }}
  {{- if .Values.meta.ingress.tls }}
  tls:
    {{- range .Values.meta.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.meta.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            {{- if .pathType }}
            pathType: {{ .pathType }}
            {{- else }}
            pathType: Prefix
            {{- end }}
            backend:
              service:
                name: {{ include "supabase.fullname" $ }}-meta
                port:
                  {{- if .servicePort }}
                  number: {{ .servicePort }}
                  {{- else }}
                  number: {{ $.Values.meta.service.port }}
                  {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
