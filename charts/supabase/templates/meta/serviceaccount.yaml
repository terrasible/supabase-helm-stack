{{- if and .Values.meta.enabled (and .Values.meta.serviceAccount .Values.meta.serviceAccount.create) .Values.meta.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "supabase.meta.serviceAccountName" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
  {{- with .Values.meta.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.meta.serviceAccount.automountServiceAccountToken }}
{{- end }}
