{{- if .Values.meta.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "supabase.fullname" . }}-meta
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: meta
  {{- if .Values.meta.secret }}
  {{- with .Values.meta.secret.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}
type: Opaque
{{- if and .Values.meta.secret .Values.meta.secret.data }}
data:
  {{- range $key, $value := .Values.meta.secret.data }}
  {{ $key }}: {{ $value | b64enc }}
  {{- end }}
{{- else }}
stringData:
  # Database password
  database-password: {{ (.Values.meta.database).password | default (randAlphaNum 32) | quote }}

  # JWT Secret for internal communication
  {{- if (.Values.meta.jwt).secret }}
  jwt-secret: {{ (.Values.meta.jwt).secret | quote }}
  {{- else }}
  jwt-secret: {{ randAlphaNum 64 | quote }}
  {{- end }}

  # API Key for meta service
  {{- if .Values.meta.apiKey }}
  api-key: {{ .Values.meta.apiKey | quote }}
  {{- else }}
  api-key: {{ randAlphaNum 32 | quote }}
  {{- end }}

  # Service Role Key
  {{- if .Values.meta.serviceRoleKey }}
  service-role-key: {{ .Values.meta.serviceRoleKey | quote }}
  {{- else }}
  service-role-key: {{ randAlphaNum 32 | quote }}
  {{- end }}

  # Anon Key
  {{- if .Values.meta.anonKey }}
  anon-key: {{ .Values.meta.anonKey | quote }}
  {{- else }}
  anon-key: {{ randAlphaNum 32 | quote }}
  {{- end }}

  # Database SSL Certificate (if provided)
  {{- if (.Values.meta.database).sslCert }}
  ssl-cert: {{ (.Values.meta.database).sslCert | quote }}
  {{- end }}

  # Database SSL Key (if provided)
  {{- if (.Values.meta.database).sslKey }}
  ssl-key: {{ (.Values.meta.database).sslKey | quote }}
  {{- end }}

  # Database SSL CA Certificate (if provided)
  {{- if (.Values.meta.database).sslCA }}
  ssl-ca: {{ (.Values.meta.database).sslCA | quote }}
  {{- end }}

  # Encryption key for sensitive data
  {{- if .Values.meta.encryptionKey }}
  encryption-key: {{ .Values.meta.encryptionKey | quote }}
  {{- else }}
  encryption-key: {{ randAlphaNum 32 | quote }}
  {{- end }}

  # Session secret
  {{- if .Values.meta.sessionSecret }}
  session-secret: {{ .Values.meta.sessionSecret | quote }}
  {{- else }}
  session-secret: {{ randAlphaNum 64 | quote }}
  {{- end }}

  # Additional secrets from values
  {{- if .Values.meta.extraSecrets }}
  {{- range $key, $value := .Values.meta.extraSecrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
