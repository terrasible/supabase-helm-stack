{{- if and .Values.studio.enabled .Values.csi.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "supabase.fullname" . }}-studio-csi
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: studio
  {{- with .Values.csi.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  provider: {{ .Values.csi.provider }}
  parameters:
    {{- if eq .Values.csi.provider "aws" }}
    region: {{ .Values.csi.aws.region }}
    {{- range $key, $value := .Values.csi.studio.objects }}
    objects: |
      - objectName: {{ $value.objectName | quote }}
        objectType: {{ $value.objectType | default "secretsmanager" | quote }}
        {{- if $value.objectAlias }}
        objectAlias: {{ $value.objectAlias | quote }}
        {{- end }}
        {{- if $value.jmesPath }}
        jmesPath:
          {{- range $jmesKey, $jmesValue := $value.jmesPath }}
          - path: {{ $jmesValue.path | quote }}
            objectAlias: {{ $jmesValue.objectAlias | quote }}
          {{- end }}
        {{- end }}
    {{- end }}
    {{- else if eq .Values.csi.provider "azure" }}
    keyvaultName: {{ .Values.csi.azure.keyvaultName }}
    tenantId: {{ .Values.csi.azure.tenantId }}
    {{- range $key, $value := .Values.csi.studio.objects }}
    objects: |
      - objectName: {{ $value.objectName | quote }}
        objectType: {{ $value.objectType | default "secret" | quote }}
        {{- if $value.objectAlias }}
        objectAlias: {{ $value.objectAlias | quote }}
        {{- end }}
        {{- if $value.objectVersion }}
        objectVersion: {{ $value.objectVersion | quote }}
        {{- end }}
    {{- end }}
    {{- else if eq .Values.csi.provider "gcp" }}
    {{- range $key, $value := .Values.csi.studio.objects }}
    secrets: |
      - resourceName: {{ $value.resourceName | quote }}
        {{- if $value.path }}
        path: {{ $value.path | quote }}
        {{- end }}
    {{- end }}
    {{- else }}
    # Custom provider parameters
    {{- toYaml .Values.csi.studio.parameters | nindent 4 }}
    {{- end }}
    {{- if .Values.csi.studio.additionalParameters }}
    {{- toYaml .Values.csi.studio.additionalParameters | nindent 4 }}
    {{- end }}
  secretObjects:
    - secretName: {{ include "supabase.fullname" . }}-studio-secret
      type: Opaque
      labels:
        {{- include "supabase.labels" . | nindent 8 }}
        app.kubernetes.io/component: studio
      data:
        # Database Configuration
        - objectName: postgres-password
          key: POSTGRES_PASSWORD
        - objectName: postgres-user
          key: POSTGRES_USER
        - objectName: database-url
          key: DATABASE_URL

        # JWT Secrets
        - objectName: jwt-secret
          key: JWT_SECRET
        - objectName: anon-key
          key: ANON_KEY
        - objectName: service-role-key
          key: SERVICE_ROLE_KEY

        # Studio Authentication
        - objectName: nextauth-secret
          key: NEXTAUTH_SECRET
        - objectName: session-secret
          key: SESSION_SECRET

        # API Keys
        - objectName: logflare-api-key
          key: LOGFLARE_API_KEY

        {{- if .Values.csi.studio.additionalSecretObjects }}
        {{- range $secretObject := .Values.csi.studio.additionalSecretObjects }}
        - objectName: {{ $secretObject.objectName }}
          key: {{ $secretObject.key }}
        {{- end }}
        {{- end }}
    {{- if .Values.csi.studio.additionalSecrets }}
    {{- range $secret := .Values.csi.studio.additionalSecrets }}
    - secretName: {{ $secret.secretName }}
      type: {{ $secret.type | default "Opaque" }}
      labels:
        {{- include "supabase.labels" $ | nindent 8 }}
        app.kubernetes.io/component: studio
        {{- if $secret.labels }}
        {{- toYaml $secret.labels | nindent 8 }}
        {{- end }}
      data:
        {{- range $data := $secret.data }}
        - objectName: {{ $data.objectName }}
          key: {{ $data.key }}
        {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
