{{- if and .Values.studio.enabled .Values.networkPolicy.enabled .Values.networkPolicy.cilium.enabled }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "supabase.fullname" . }}-studio
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: studio
  {{- with .Values.networkPolicy.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  endpointSelector:
    matchLabels:
      {{- include "supabase.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: studio
  ingress:
    # Allow traffic from Kong Gateway (via Kong Operator)
    {{- if .Values.kongOperator.enabled }}
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": {{ .Values.kongOperator.serviceNamespace }}
            app: kong
    {{- end }}
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    # Allow traffic from ingress controllers
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: ingress-nginx
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: istio-system
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    {{- if .Values.studio.serviceMonitor.enabled }}
    # Allow Prometheus to scrape metrics
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: prometheus
        - matchLabels:
            k8s:app: prometheus
        - matchLabels:
            k8s:app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "{{ .Values.studio.serviceMonitor.port | default "metrics" }}"
              protocol: TCP
    {{- end }}
    {{- with .Values.networkPolicy.cilium.studio.additionalIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # Allow DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Allow access to database
    - toEndpoints:
        - matchLabels:
            {{- include "supabase.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: db
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    {{- if .Values.externalDatabase.enabled }}
    # Allow access to external database
    - toFQDNs:
        - matchName: {{ .Values.externalDatabase.host | quote }}
      toPorts:
        - ports:
            - port: "{{ .Values.externalDatabase.port | default 5432 }}"
              protocol: TCP
    {{- end }}
    # Allow access to Meta service
    - toEndpoints:
        - matchLabels:
            {{- include "supabase.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: meta
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Allow access to Auth service
    - toEndpoints:
        - matchLabels:
            {{- include "supabase.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: auth
      toPorts:
        - ports:
            - port: "9999"
              protocol: TCP
    # Allow access to Storage service
    - toEndpoints:
        - matchLabels:
            {{- include "supabase.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: storage
      toPorts:
        - ports:
            - port: "5000"
              protocol: TCP
    # Allow access to Realtime service
    - toEndpoints:
        - matchLabels:
            {{- include "supabase.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: realtime
      toPorts:
        - ports:
            - port: "4000"
              protocol: TCP
    # Allow access to REST API service
    - toEndpoints:
        - matchLabels:
            {{- include "supabase.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: rest
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    # Allow access to Kong Gateway (via Kong Operator)
    {{- if .Values.kongOperator.enabled }}
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": {{ .Values.kongOperator.serviceNamespace }}
            app: kong
      toPorts:
        - ports:
            - port: "{{ .Values.kongOperator.servicePort }}"
              protocol: TCP
            - port: "{{ .Values.kongOperator.adminApi.servicePort }}"
              protocol: TCP
    {{- end }}
    # Allow HTTPS traffic for external APIs
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Allow HTTP traffic for external APIs
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
    {{- with .Values.networkPolicy.cilium.studio.additionalEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
