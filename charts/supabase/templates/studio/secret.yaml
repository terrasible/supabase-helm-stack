{{- if .Values.studio.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "supabase.fullname" . }}-studio-secret
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: studio
  {{- if and .Values.studio.secret .Values.studio.secret.annotations }}
  annotations:
    {{- toYaml .Values.studio.secret.annotations | nindent 4 }}
  {{- end }}
type: Opaque
{{- if and .Values.studio.secret .Values.studio.secret.data }}
data:
  {{- range $key, $value := .Values.studio.secret.data }}
  {{ $key }}: {{ $value }}
  {{- end }}
{{- else }}
stringData:
  # Database Configuration
  POSTGRES_PASSWORD: {{ (.Values.studio.secret).postgresPassword | default "postgres" }}

  # JWT Secrets
  JWT_SECRET: {{ .Values.global.jwtSecret | default "super-secret-jwt-token-with-at-least-32-characters-long" }}
  ANON_KEY: {{ .Values.global.anonKey | default "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0" }}
  SERVICE_ROLE_KEY: {{ .Values.global.serviceRoleKey | default "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU" }}

  # Studio Authentication
  NEXTAUTH_SECRET: {{ (.Values.studio.secret).nextAuthSecret | default "super-secret-nextauth-secret-with-at-least-32-characters" }}

  # API Keys
  LOGFLARE_API_KEY: {{ (.Values.studio.secret).logflareApiKey | default "" }}

  # Database Connection
  DATABASE_URL: {{ (.Values.studio.secret).databaseUrl | default "postgresql://postgres:postgres@supabase-db:5432/postgres" }}

  # Session Secret
  SESSION_SECRET: {{ (.Values.studio.secret).sessionSecret | default "super-secret-session-key-change-in-production" }}

  # Additional secrets
  {{- if and .Values.studio.secret .Values.studio.secret.additionalSecrets }}
  {{- range $key, $value := .Values.studio.secret.additionalSecrets }}
  {{ $key }}: {{ $value }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
