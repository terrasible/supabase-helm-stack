{{- if and .Values.studio.enabled .Values.studio.ingress .Values.studio.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "supabase.fullname" . }}-studio
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: studio
  {{- with .Values.studio.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.studio.ingress.ingressClassName }}
  ingressClassName: {{ .Values.studio.ingress.ingressClassName }}
  {{- end }}
  {{- if .Values.studio.ingress.tls }}
  tls:
    {{- range .Values.studio.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.studio.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            {{- if .pathType }}
            pathType: {{ .pathType }}
            {{- else }}
            pathType: Prefix
            {{- end }}
            backend:
              service:
                name: {{ include "supabase.fullname" $ }}-studio
                port:
                  {{- if .backend.service.port.name }}
                  name: {{ .backend.service.port.name }}
                  {{- else }}
                  number: {{ .backend.service.port.number | default 3000 }}
                  {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
