{{- if and .Values.studio.enabled (and .Values.studio.serviceAccount .Values.studio.serviceAccount.create) .Values.studio.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "supabase.studio.serviceAccountName" . }}
  labels:
    {{- include "supabase.studio.labels" . | nindent 4 }}
  {{- with .Values.studio.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if and .Values.studio.serviceAccount.irsa .Values.studio.serviceAccount.irsa.enabled }}
    eks.amazonaws.com/role-arn: {{ .Values.studio.serviceAccount.irsa.roleArn }}
  {{- end }}
{{- end }}
