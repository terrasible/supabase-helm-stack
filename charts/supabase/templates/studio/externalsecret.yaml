{{- if and .Values.studio.enabled .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "supabase.fullname" . }}-studio-external-secret
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: studio
  {{- with .Values.externalSecrets.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore.name }}
    kind: {{ .Values.externalSecrets.secretStore.kind | default "SecretStore" }}
  target:
    name: {{ include "supabase.fullname" . }}-studio-secret
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          {{- include "supabase.labels" . | nindent 10 }}
          app.kubernetes.io/component: studio
      data:
        # Database Configuration
        POSTGRES_PASSWORD: "{{ "{{ .postgres_password }}" }}"
        DATABASE_URL: "postgresql://{{ "{{ .postgres_user }}" }}:{{ "{{ .postgres_password }}" }}@{{ .Values.studio.config.postgresHost | default "supabase-db" }}:{{ .Values.studio.config.postgresPort | default "5432" }}/{{ .Values.studio.config.postgresDb | default "postgres" }}"

        # JWT Secrets
        JWT_SECRET: "{{ "{{ .jwt_secret }}" }}"
        ANON_KEY: "{{ "{{ .anon_key }}" }}"
        SERVICE_ROLE_KEY: "{{ "{{ .service_role_key }}" }}"

        # Studio Authentication
        NEXTAUTH_SECRET: "{{ "{{ .nextauth_secret }}" }}"
        SESSION_SECRET: "{{ "{{ .session_secret }}" }}"

        # API Keys
        LOGFLARE_API_KEY: "{{ "{{ .logflare_api_key | default \"\" }}" }}"

        {{- if .Values.externalSecrets.studio.additionalData }}
        {{- range $key, $value := .Values.externalSecrets.studio.additionalData }}
        {{ $key }}: "{{ $value }}"
        {{- end }}
        {{- end }}
  data:
    # Database credentials
    - secretKey: postgres_password
      remoteRef:
        key: {{ .Values.externalSecrets.studio.postgresPassword.key }}
        {{- if .Values.externalSecrets.studio.postgresPassword.property }}
        property: {{ .Values.externalSecrets.studio.postgresPassword.property }}
        {{- end }}

    - secretKey: postgres_user
      remoteRef:
        key: {{ .Values.externalSecrets.studio.postgresUser.key | default .Values.externalSecrets.studio.postgresPassword.key }}
        property: {{ .Values.externalSecrets.studio.postgresUser.property | default "username" }}

    # JWT secrets
    - secretKey: jwt_secret
      remoteRef:
        key: {{ .Values.externalSecrets.studio.jwtSecret.key }}
        {{- if .Values.externalSecrets.studio.jwtSecret.property }}
        property: {{ .Values.externalSecrets.studio.jwtSecret.property }}
        {{- end }}

    - secretKey: anon_key
      remoteRef:
        key: {{ .Values.externalSecrets.studio.anonKey.key }}
        {{- if .Values.externalSecrets.studio.anonKey.property }}
        property: {{ .Values.externalSecrets.studio.anonKey.property }}
        {{- end }}

    - secretKey: service_role_key
      remoteRef:
        key: {{ .Values.externalSecrets.studio.serviceRoleKey.key }}
        {{- if .Values.externalSecrets.studio.serviceRoleKey.property }}
        property: {{ .Values.externalSecrets.studio.serviceRoleKey.property }}
        {{- end }}

    # Studio authentication
    - secretKey: nextauth_secret
      remoteRef:
        key: {{ .Values.externalSecrets.studio.nextAuthSecret.key }}
        {{- if .Values.externalSecrets.studio.nextAuthSecret.property }}
        property: {{ .Values.externalSecrets.studio.nextAuthSecret.property }}
        {{- end }}

    - secretKey: session_secret
      remoteRef:
        key: {{ .Values.externalSecrets.studio.sessionSecret.key }}
        {{- if .Values.externalSecrets.studio.sessionSecret.property }}
        property: {{ .Values.externalSecrets.studio.sessionSecret.property }}
        {{- end }}

    # Optional API keys
    {{- if .Values.externalSecrets.studio.logflareApiKey }}
    - secretKey: logflare_api_key
      remoteRef:
        key: {{ .Values.externalSecrets.studio.logflareApiKey.key }}
        {{- if .Values.externalSecrets.studio.logflareApiKey.property }}
        property: {{ .Values.externalSecrets.studio.logflareApiKey.property }}
        {{- end }}
    {{- end }}

    {{- if .Values.externalSecrets.studio.additionalSecrets }}
    # Additional secrets
    {{- range $secretKey, $remoteRef := .Values.externalSecrets.studio.additionalSecrets }}
    - secretKey: {{ $secretKey }}
      remoteRef:
        key: {{ $remoteRef.key }}
        {{- if $remoteRef.property }}
        property: {{ $remoteRef.property }}
        {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
