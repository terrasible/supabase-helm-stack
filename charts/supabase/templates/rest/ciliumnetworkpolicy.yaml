{{- if and .Values.rest.enabled .Values.networkPolicy.enabled .Values.networkPolicy.cilium.enabled }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "supabase.fullname" . }}-rest
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: rest
  {{- with .Values.networkPolicy.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  endpointSelector:
    matchLabels:
      {{- include "supabase.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: rest
  ingress:
    # Allow ingress from Kong Gateway (via Kong Operator)
    {{- if .Values.kongOperator.enabled }}
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": {{ .Values.kongOperator.serviceNamespace }}
            app: kong
    {{- end }}
      toPorts:
        - ports:
            - port: "{{ .Values.rest.service.targetPort | default 3000 }}"
              protocol: TCP
    # Allow metrics scraping from Prometheus
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "{{ .Values.rest.service.targetPort | default 3000 }}"
              protocol: TCP
    {{- if .Values.rest.networkPolicy.cilium.additionalIngress }}
    {{- toYaml .Values.rest.networkPolicy.cilium.additionalIngress | nindent 4 }}
    {{- end }}
  egress:
    # Allow egress to database
    - toEndpoints:
        - matchLabels:
            {{- include "supabase.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: db
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Allow DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Allow HTTPS for external services
    - toFQDNs:
        - matchName: "*.supabase.co"
        - matchName: "*.github.com"
        - matchName: "*.docker.io"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    {{- if .Values.rest.networkPolicy.cilium.additionalEgress }}
    {{- toYaml .Values.rest.networkPolicy.cilium.additionalEgress | nindent 4 }}
    {{- end }}
{{- end }}
