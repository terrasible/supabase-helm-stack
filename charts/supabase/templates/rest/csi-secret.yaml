{{- if and .Values.rest.enabled .Values.csi.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "supabase.fullname" . }}-rest-csi-secret
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: rest
  {{- with .Values.csi.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  provider: {{ .Values.csi.provider | default "azure" }}
  parameters:
    usePodIdentity: "{{ .Values.csi.usePodIdentity | default "false" }}"
    useVMManagedIdentity: "{{ .Values.csi.useVMManagedIdentity | default "true" }}"
    userAssignedIdentityID: {{ .Values.csi.userAssignedIdentityID | default "" | quote }}
    keyvaultName: {{ .Values.csi.keyvaultName | required "CSI keyvaultName is required" | quote }}
    cloudName: {{ .Values.csi.cloudName | default "" | quote }}
    objects: |
      array:
        - |
          objectName: supabase-rest-database-url
          objectType: secret
          objectVersion: ""
        - |
          objectName: supabase-rest-jwt-secret
          objectType: secret
          objectVersion: ""
        - |
          objectName: supabase-rest-anon-key
          objectType: secret
          objectVersion: ""
        - |
          objectName: supabase-rest-service-key
          objectType: secret
          objectVersion: ""
        - |
          objectName: supabase-rest-db-schema
          objectType: secret
          objectVersion: ""
        {{- if .Values.csi.rest.additionalSecrets }}
        {{- range .Values.csi.rest.additionalSecrets }}
        - |
          objectName: {{ .objectName }}
          objectType: {{ .objectType | default "secret" }}
          objectVersion: {{ .objectVersion | default "" | quote }}
        {{- end }}
        {{- end }}
  secretObjects:
    - secretName: {{ include "supabase.fullname" . }}-rest-csi-secret
      type: Opaque
      data:
        - objectName: supabase-rest-database-url
          key: database-url
        - objectName: supabase-rest-jwt-secret
          key: jwt-secret
        - objectName: supabase-rest-anon-key
          key: anon-key
        - objectName: supabase-rest-service-key
          key: service-key
        - objectName: supabase-rest-db-schema
          key: db-schema
        {{- if .Values.csi.rest.additionalSecretObjects }}
        {{- range .Values.csi.rest.additionalSecretObjects }}
        - objectName: {{ .objectName }}
          key: {{ .key }}
        {{- end }}
        {{- end }}
{{- end }}
