{{- if and .Values.rest.enabled .Values.rest.ingress .Values.rest.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "supabase.fullname" . }}-rest
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: rest
  {{- with .Values.rest.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.rest.ingress.ingressClassName }}
  ingressClassName: {{ .Values.rest.ingress.ingressClassName }}
  {{- end }}
  {{- if .Values.rest.ingress.tls }}
  tls:
    {{- range .Values.rest.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.rest.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            {{- if .pathType }}
            pathType: {{ .pathType }}
            {{- end }}
            backend:
              service:
                name: {{ include "supabase.fullname" $ }}-rest
                port:
                  number: {{ $.Values.rest.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
