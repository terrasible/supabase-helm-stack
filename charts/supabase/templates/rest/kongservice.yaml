{{- if and .Values.rest.enabled (and .Values.rest.kong (and .Values.rest .Values.rest.kong) .Values.rest.kong.enabled) }}
apiVersion: configuration.konghq.com/v1
kind: KongService
metadata:
  name: {{ include "supabase.rest.fullname" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
spec:
  host: {{ include "supabase.rest.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local
  port: {{ .Values.rest.service.port }}
  protocol: http
  {{- with .Values.rest.kong.path }}
  path: {{ .Values }}
  {{- end }}
  {{- with .Values.rest.kong.retries }}
  retries: {{ .Values }}
  {{- end }}
  {{- with .Values.rest.kong.connectTimeout }}
  connect_timeout: {{ .Values }}
  {{- end }}
  {{- with .Values.rest.kong.writeTimeout }}
  write_timeout: {{ .Values }}
  {{- end }}
  {{- with .Values.rest.kong.readTimeout }}
  read_timeout: {{ .Values }}
  {{- end }}
---
{{- if and .Values.rest.kong.route .Values.rest.kong.route.enabled }}
apiVersion: configuration.konghq.com/v1
kind: KongRoute
metadata:
  name: {{ include "supabase.rest.fullname" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
spec:
  service:
    name: {{ include "supabase.rest.fullname" . }}
  paths:
    {{- toYaml .Values.rest.kong.route.paths | nindent 4 }}
  strip_path: {{ .Values.rest.kong.route.stripPath }}
  {{- with .Values.rest.kong.route.methods }}
  methods:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.rest.kong.route.protocols }}
  protocols:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
{{- if and .Values.rest.kong .Values.rest.kong.plugins }}
{{- range $plugin := .Values.rest.kong.plugins }}
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: {{ include "supabase.rest.fullname" $ }}-{{ $plugin.name }}
  labels:
    {{- include "supabase.labels" $ | nindent 4 }}
plugin: {{ $plugin.name }}
{{- with $plugin.config }}
config:
  {{- toYaml . | nindent 2 }}
{{- end }}
---
{{- end }}
{{- end }}
{{- end }}
