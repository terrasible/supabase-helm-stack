{{- if and .Values.rest.enabled (and .Values.rest.serviceAccount (and .Values.rest.serviceAccount .Values.rest.serviceAccount.create) .Values.rest.serviceAccount.create) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "supabase.rest.serviceAccountName" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
  {{- with .Values.rest.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.rest.serviceAccount.automountServiceAccountToken }}
{{- end }}
