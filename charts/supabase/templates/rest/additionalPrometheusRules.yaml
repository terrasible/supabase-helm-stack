{{- if and .Values.rest.enabled .Values.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "supabase.fullname" . }}-rest-rules
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: rest
    {{- with .Values.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.prometheusRule.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  groups:
    - name: supabase.rest.rules
      rules:
        # REST API availability
        - alert: SupabaseRestDown
          expr: up{job="supabase-rest"} == 0
          for: 5m
          labels:
            severity: critical
            service: rest
          annotations:
            summary: "Supabase REST API service is down"
            description: "Supabase REST API service has been down for more than 5 minutes."

        # High error rate
        - alert: SupabaseRestHighErrorRate
          expr: |
            (
              rate(http_requests_total{job="supabase-rest",code=~"5.."}[5m]) /
              rate(http_requests_total{job="supabase-rest"}[5m])
            ) > 0.1
          for: 5m
          labels:
            severity: warning
            service: rest
          annotations:
            summary: "High error rate in Supabase REST API"
            description: "Supabase REST API error rate is above 10% for more than 5 minutes."

        # High response time
        - alert: SupabaseRestHighLatency
          expr: |
            histogram_quantile(0.95,
              rate(http_request_duration_seconds_bucket{job="supabase-rest"}[5m])
            ) > 2
          for: 5m
          labels:
            severity: warning
            service: rest
          annotations:
            summary: "High latency in Supabase REST API"
            description: "Supabase REST API 95th percentile latency is above 2 seconds for more than 5 minutes."

        # Database connection issues
        - alert: SupabaseRestDatabaseConnectionIssues
          expr: |
            rate(postgrest_db_pool_timeouts_total[5m]) > 0.1
          for: 2m
          labels:
            severity: warning
            service: rest
          annotations:
            summary: "Database connection timeouts in Supabase REST API"
            description: "Supabase REST API is experiencing database connection timeouts."

        # High memory usage
        - alert: SupabaseRestHighMemoryUsage
          expr: |
            (
              container_memory_working_set_bytes{pod=~".*-rest-.*"} /
              container_spec_memory_limit_bytes{pod=~".*-rest-.*"}
            ) > 0.9
          for: 5m
          labels:
            severity: warning
            service: rest
          annotations:
            summary: "High memory usage in Supabase REST API"
            description: "Supabase REST API memory usage is above 80% for more than 5 minutes."

        # High CPU usage
        - alert: SupabaseRestHighCPUUsage
          expr: |
            (
              rate(container_cpu_usage_seconds_total{pod=~".*-rest-.*"}[5m]) /
              container_spec_cpu_quota{pod=~".*-rest-.*"} * container_spec_cpu_period{pod=~".*-rest-.*"}
            ) > 0.9
          for: 5m
          labels:
            severity: warning
            service: rest
          annotations:
            summary: "High CPU usage in Supabase REST API"
            description: "Supabase REST API CPU usage is above 80% for more than 5 minutes."

    {{- if .Values.rest.prometheusRules.additionalRules }}
    {{- range .Values.rest.prometheusRules.additionalRules }}
    - {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- end }}
{{- end }}
