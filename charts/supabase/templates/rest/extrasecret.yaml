{{- if and .Values.rest.enabled .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "supabase.fullname" . }}-rest-external-secret
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: rest
  {{- with .Values.externalSecrets.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore.name | default (printf "%s-secret-store" (include "supabase.fullname" .)) }}
    kind: {{ .Values.externalSecrets.secretStore.kind | default "SecretStore" }}
  target:
    name: {{ include "supabase.fullname" . }}-rest-external-secret
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          {{- include "supabase.labels" . | nindent 10 }}
          app.kubernetes.io/component: rest
      data:
        database-url: "postgresql://{{ `{{ .username }}` }}:{{ `{{ .password }}` }}@{{ include "supabase.database.host" . }}:5432/{{ .Values.legacySecret.db.database }}"
        jwt-secret: "{{ `{{ .jwt_secret }}` }}"
        anon-key: "{{ `{{ .anon_key }}` }}"
        service-key: "{{ `{{ .service_key }}` }}"
        db-schema: "{{ `{{ .db_schema }}` }}"
        db-anon-role: "{{ `{{ .db_anon_role }}` }}"
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.externalSecrets.rest.database.usernameKey | default "supabase/rest/db/username" }}
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecrets.rest.database.passwordKey | default "supabase/rest/db/password" }}
    - secretKey: jwt_secret
      remoteRef:
        key: {{ .Values.externalSecrets.rest.jwt.secretKey | default "supabase/rest/jwt/secret" }}
    - secretKey: anon_key
      remoteRef:
        key: {{ .Values.externalSecrets.rest.jwt.anonKey | default "supabase/rest/jwt/anon" }}
    - secretKey: service_key
      remoteRef:
        key: {{ .Values.externalSecrets.rest.jwt.serviceKey | default "supabase/rest/jwt/service" }}
    - secretKey: db_schema
      remoteRef:
        key: {{ .Values.externalSecrets.rest.config.schemaKey | default "supabase/rest/config/schema" }}
    - secretKey: db_anon_role
      remoteRef:
        key: {{ .Values.externalSecrets.rest.config.anonRoleKey | default "supabase/rest/config/anon-role" }}
    {{- if .Values.externalSecrets.rest.additionalSecrets }}
    {{- range .Values.externalSecrets.rest.additionalSecrets }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteRef.key }}
        {{- if .remoteRef.property }}
        property: {{ .remoteRef.property }}
        {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
