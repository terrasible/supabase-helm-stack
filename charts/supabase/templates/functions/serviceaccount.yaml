{{- if and .Values.functions.enabled (and .Values.functions.serviceAccount .Values.functions.serviceAccount.create) .Values.functions.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "supabase.functions.serviceAccountName" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
  {{- with .Values.functions.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.functions.serviceAccount.automountServiceAccountToken }}
{{- end }}
