{{- if and .Values.auth.enabled .Values.alertmanager.additionalAlertmanagerConfigs }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "supabase.fullname" . }}-auth-alertmanager-configs
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
type: Opaque
stringData:
  alertmanager-auth.yaml: |
    global:
      smtp_smarthost: 'localhost:587'
      smtp_from: 'alertmanager@supabase.local'

    route:
      group_by: ['alertname', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'auth-alerts'
      routes:
        - match:
            service: auth
          receiver: 'auth-team'

    receivers:
      - name: 'auth-alerts'
        webhook_configs:
          - url: 'http://webhook.example.com/auth'
            send_resolved: true

      - name: 'auth-team'
        email_configs:
          - to: 'auth-team@company.com'
            subject: 'Supabase Auth Alert: {{ .GroupLabels.alertname }}'
            body: |
              {{ range .Alerts }}
              Alert: {{ .Annotations.summary }}
              Description: {{ .Annotations.description }}
              {{ end }}

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'service']

    {{- if .Values.auth.alertmanagerConfigs }}
    {{- toYaml .Values.auth.alertmanagerConfigs | nindent 4 }}
    {{- end }}
{{- end }}
