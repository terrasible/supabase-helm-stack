{{- if and .Values.auth.enabled .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "supabase.fullname" . }}-auth-external-secret
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
  {{- with .Values.externalSecrets.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore.name | default (printf "%s-secret-store" (include "supabase.fullname" .)) }}
    kind: {{ .Values.externalSecrets.secretStore.kind | default "SecretStore" }}
  target:
    name: {{ include "supabase.fullname" . }}-auth-external-secret
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          {{- include "supabase.labels" . | nindent 10 }}
          app.kubernetes.io/component: auth
      data:
        database-url: "postgresql://{{ `{{ .username }}` }}:{{ `{{ .password }}` }}@{{ include "supabase.database.host" . }}:5432/{{ .Values.legacySecret.db.database }}"
        jwt-secret: "{{ `{{ .jwt_secret }}` }}"
        anon-key: "{{ `{{ .anon_key }}` }}"
        service-key: "{{ `{{ .service_key }}` }}"
        smtp-password: "{{ `{{ .smtp_password }}` }}"
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.externalSecrets.auth.database.usernameKey | default "supabase/auth/db/username" }}
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecrets.auth.database.passwordKey | default "supabase/auth/db/password" }}
    - secretKey: jwt_secret
      remoteRef:
        key: {{ .Values.externalSecrets.auth.jwt.secretKey | default "supabase/auth/jwt/secret" }}
    - secretKey: anon_key
      remoteRef:
        key: {{ .Values.externalSecrets.auth.jwt.anonKey | default "supabase/auth/jwt/anon" }}
    - secretKey: service_key
      remoteRef:
        key: {{ .Values.externalSecrets.auth.jwt.serviceKey | default "supabase/auth/jwt/service" }}
    - secretKey: smtp_password
      remoteRef:
        key: {{ .Values.externalSecrets.auth.smtp.passwordKey | default "supabase/auth/smtp/password" }}
    {{- if .Values.externalSecrets.auth.additionalSecrets }}
    {{- range .Values.externalSecrets.auth.additionalSecrets }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteRef.key }}
        {{- if .remoteRef.property }}
        property: {{ .remoteRef.property }}
        {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
