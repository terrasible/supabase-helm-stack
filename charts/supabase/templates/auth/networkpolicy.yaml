{{- if and .Values.auth.enabled .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "supabase.fullname" . }}-auth
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
  {{- with .Values.networkPolicy.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      {{- include "supabase.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: auth
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from Kong Gateway (via Kong Operator)
    {{- if .Values.kongOperator.enabled }}
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .Values.kongOperator.serviceNamespace }}
        - podSelector:
            matchLabels:
              app: kong
    {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.auth.service.port }}
    # Allow ingress for metrics scraping
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 9090
    {{- if .Values.networkPolicy.ingress }}
    {{- range .Values.networkPolicy.ingress }}
    - {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- end }}
  egress:
    # Allow egress to database
    - to:
        - podSelector:
            matchLabels:
              {{- include "supabase.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: postgresql
      ports:
        - protocol: TCP
          port: 5432
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTPS for external services
    - to: []
      ports:
        - protocol: TCP
          port: 443
    {{- if .Values.networkPolicy.egress }}
    {{- range .Values.networkPolicy.egress }}
    - {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- end }}
{{- end }}
