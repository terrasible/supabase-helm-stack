{{- if and .Values.auth.enabled .Values.prometheus.additionalScrapeConfigs }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "supabase.fullname" . }}-auth-additional-scrape-configs
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
type: Opaque
stringData:
  prometheus-additional.yaml: |
    - job_name: 'supabase-auth-custom'
      static_configs:
        - targets: ['{{ include "supabase.fullname" . }}-auth:{{ .Values.auth.service.port }}']
      metrics_path: /metrics
      scrape_interval: 30s
      scrape_timeout: 10s
      scheme: http
      {{- if .Values.auth.additionalScrapeConfigs }}
      {{- toYaml .Values.auth.additionalScrapeConfigs | nindent 6 }}
      {{- end }}
{{- end }}
