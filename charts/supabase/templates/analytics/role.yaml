{{- if and .Values.analytics.enabled (and .Values.analytics.rbac .Values.analytics.rbac.create) .Values.analytics.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "supabase.analytics.fullname" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
rules:
  {{- toYaml .Values.analytics.rbac.rules | nindent 2 }}
{{- end }}
