{{- if and .Values.analytics.enabled (and .Values.analytics.serviceAccount .Values.analytics.serviceAccount.create) .Values.analytics.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "supabase.analytics.serviceAccountName" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
  {{- with .Values.analytics.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.analytics.serviceAccount.automountServiceAccountToken }}
{{- end }}
