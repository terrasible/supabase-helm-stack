{{- if and .Values.storage.enabled (and .Values.storage.monitoring (and .Values.storage .Values.storage.monitoring) .Values.storage.monitoring.enabled) }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "supabase.storage.fullname" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    {{- with and .Values.storage.monitoring.serviceMonitor .Values.storage.monitoring.serviceMonitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "supabase.storage.selectorLabels" . | nindent 6 }}
  endpoints:
  - port: http
    interval: {{ .Values.storage.monitoring.serviceMonitor.interval | default "30s" }}
    path: {{ .Values.storage.monitoring.serviceMonitor.path | default "/metrics" }}
    {{- with and .Values.storage.monitoring.serviceMonitor .Values.storage.monitoring.serviceMonitor.metricRelabelings }}
    metricRelabelings:
      {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with and .Values.storage.monitoring.serviceMonitor .Values.storage.monitoring.serviceMonitor.relabelings }}
    relabelings:
      {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
