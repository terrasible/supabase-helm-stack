{{- if and .Values.storage.enabled .Values.prometheus.additionalScrapeConfigs }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "supabase.fullname" . }}-storage-scrape-config
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
  {{- with .Values.prometheus.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  prometheus-additional.yaml: |
    - job_name: 'supabase-storage'
      kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
              - {{ .Release.Namespace }}
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
          action: keep
          regex: {{ include "supabase.name" . }}
        - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
          action: keep
          regex: storage
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          target_label: __address__
        - action: labelmap
          regex: __meta_kubernetes_pod_label_(.+)
        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: kubernetes_namespace
        - source_labels: [__meta_kubernetes_pod_name]
          action: replace
          target_label: kubernetes_pod_name
      scrape_interval: {{ .Values.storage.serviceMonitor.interval | default "30s" }}
      scrape_timeout: {{ .Values.storage.serviceMonitor.scrapeTimeout | default "10s" }}
      metrics_path: {{ .Values.storage.serviceMonitor.path | default "/metrics" }}
    {{- if .Values.prometheus.additionalScrapeConfigs.extraConfigs }}
    {{- toYaml .Values.prometheus.additionalScrapeConfigs.extraConfigs | nindent 4 }}
    {{- end }}
{{- end }}
