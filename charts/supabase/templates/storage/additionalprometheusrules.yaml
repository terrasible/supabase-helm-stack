{{- if and .Values.storage.enabled .Values.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "supabase.fullname" . }}-storage
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
    {{- with .Values.prometheusRule.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.prometheusRule.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  groups:
    - name: supabase.storage.rules
      interval: {{ .Values.prometheusRule.interval | default "30s" }}
      rules:
        # Storage service availability
        - alert: SupabaseStorageDown
          expr: up{job="supabase-storage"} == 0
          for: {{ .Values.prometheusRule.rules.storageDown.for | default "1m" }}
          labels:
            severity: critical
            service: storage
            {{- with .Values.prometheusRule.rules.storageDown.labels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "Supabase Storage service is down"
            description: "Storage service has been down for more than 1 minute."
            {{- with .Values.prometheusRule.rules.storageDown.annotations }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

        # High request rate
        - alert: SupabaseStorageHighRequestRate
          expr: rate(http_requests_total{job="supabase-storage"}[5m]) > {{ .Values.prometheusRule.rules.highRequestRate.threshold | default 100 }}
          for: {{ .Values.prometheusRule.rules.highRequestRate.for | default "2m" }}
          labels:
            severity: warning
            service: storage
            {{- with .Values.prometheusRule.rules.highRequestRate.labels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "High request rate on Storage service"
            description: "Storage service is receiving {{ "{{" }} $value {{ "}}" }} requests per second."
            {{- with .Values.prometheusRule.rules.highRequestRate.annotations }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

        # High error rate
        - alert: SupabaseStorageHighErrorRate
          expr: rate(http_requests_total{job="supabase-storage",code=~"5.."}[5m]) / rate(http_requests_total{job="supabase-storage"}[5m]) > {{ .Values.prometheusRule.rules.highErrorRate.threshold | default 0.1 }}
          for: {{ .Values.prometheusRule.rules.highErrorRate.for | default "2m" }}
          labels:
            severity: critical
            service: storage
            {{- with .Values.prometheusRule.rules.highErrorRate.labels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "High error rate on Storage service"
            description: "Storage service error rate is {{ "{{" }} $value | humanizePercentage {{ "}}" }}."
            {{- with .Values.prometheusRule.rules.highErrorRate.annotations }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

        # High response time
        - alert: SupabaseStorageHighResponseTime
          expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="supabase-storage"}[5m])) > {{ .Values.prometheusRule.rules.highResponseTime.threshold | default 1 }}
          for: {{ .Values.prometheusRule.rules.highResponseTime.for | default "2m" }}
          labels:
            severity: warning
            service: storage
            {{- with .Values.prometheusRule.rules.highResponseTime.labels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "High response time on Storage service"
            description: "Storage service 95th percentile response time is {{ "{{" }} $value {{ "}}" }} seconds."
            {{- with .Values.prometheusRule.rules.highResponseTime.annotations }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

        # S3 connection issues
        - alert: SupabaseStorageS3ConnectionIssues
          expr: increase(storage_s3_errors_total{job="supabase-storage"}[5m]) > {{ .Values.prometheusRule.rules.s3ConnectionIssues.threshold | default 10 }}
          for: {{ .Values.prometheusRule.rules.s3ConnectionIssues.for | default "1m" }}
          labels:
            severity: warning
            service: storage
            {{- with .Values.prometheusRule.rules.s3ConnectionIssues.labels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "Storage service S3 connection issues"
            description: "Storage service is experiencing S3 connection errors: {{ "{{" }} $value {{ "}}" }} errors in the last 5 minutes."
            {{- with .Values.prometheusRule.rules.s3ConnectionIssues.annotations }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

        # High memory usage
        - alert: SupabaseStorageHighMemoryUsage
          expr: (container_memory_working_set_bytes{pod=~".*storage.*"} / container_spec_memory_limit_bytes{pod=~".*storage.*"}) > {{ .Values.prometheusRule.rules.highMemoryUsage.threshold | default 0.8 }}
          for: {{ .Values.prometheusRule.rules.highMemoryUsage.for | default "2m" }}
          labels:
            severity: warning
            service: storage
            {{- with .Values.prometheusRule.rules.highMemoryUsage.labels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "High memory usage on Storage service"
            description: "Storage service memory usage is {{ "{{" }} $value | humanizePercentage {{ "}}" }}."
            {{- with .Values.prometheusRule.rules.highMemoryUsage.annotations }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

        # High CPU usage
        - alert: SupabaseStorageHighCPUUsage
          expr: (rate(container_cpu_usage_seconds_total{pod=~".*storage.*"}[5m]) / container_spec_cpu_quota{pod=~".*storage.*"} * container_spec_cpu_period{pod=~".*storage.*"}) > {{ .Values.prometheusRule.rules.highCPUUsage.threshold | default 0.8 }}
          for: {{ .Values.prometheusRule.rules.highCPUUsage.for | default "2m" }}
          labels:
            severity: warning
            service: storage
            {{- with .Values.prometheusRule.rules.highCPUUsage.labels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "High CPU usage on Storage service"
            description: "Storage service CPU usage is {{ "{{" }} $value | humanizePercentage {{ "}}" }}."
            {{- with .Values.prometheusRule.rules.highCPUUsage.annotations }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

        {{- if .Values.prometheusRule.additionalRules }}
        # Additional custom rules
        {{- toYaml .Values.prometheusRule.additionalRules | nindent 8 }}
        {{- end }}
{{- end }}
