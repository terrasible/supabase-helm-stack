{{- if .Values.storage.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "supabase.fullname" . }}-storage-secret
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
  {{- if and .Values.storage.secret .Values.storage.secret.annotations }}
  {{- with .Values.storage.secret.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}
type: Opaque
{{- if and .Values.storage.secret .Values.storage.secret.data }}
data:
  {{- range $key, $value := .Values.storage.secret.data }}
  {{ $key }}: {{ $value | b64enc }}
  {{- end }}
{{- else }}
stringData:
  # Database Configuration
  database-url: {{ .Values.global.databaseUrl | default "postgresql://postgres:postgres@supabase-db:5432/postgres" }}
  jwt-secret: {{ .Values.global.jwtSecret | default "super-secret-jwt-token-with-at-least-32-characters-long" }}
  anon-key: {{ .Values.global.anonKey | default "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0" }}
  service-key: {{ .Values.global.serviceRoleKey | default "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU" }}

  # S3/MinIO Configuration
  s3-endpoint: {{ (.Values.storage.secret).s3Endpoint | default "minio:9000" }}
  s3-access-key-id: {{ (.Values.storage.secret).s3AccessKeyId | default "minioadmin" }}
  s3-secret-access-key: {{ (.Values.storage.secret).s3SecretAccessKey | default "minioadmin" }}
  s3-bucket: {{ (.Values.storage.secret).s3Bucket | default "supabase" }}
  s3-region: {{ (.Values.storage.secret).s3Region | default "us-east-1" }}

  # Storage API Configuration
  gotrue-url: {{ (.Values.storage.secret).gotrueUrl | default "http://supabase-auth:9999" }}
  imgproxy-url: {{ (.Values.storage.secret).imgproxyUrl | default "http://imgproxy:8080" }}
  tenant-id: {{ (.Values.storage.secret).tenantId | default "stub_tenant" }}

  # Additional secrets
  {{- if and .Values.storage.secret (.Values.storage.secret).additionalSecrets }}
  {{- range $key, $value := (.Values.storage.secret).additionalSecrets }}
  {{ $key }}: {{ $value }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
