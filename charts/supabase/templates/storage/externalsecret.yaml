{{- if and .Values.storage.enabled .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "supabase.fullname" . }}-storage-external-secret
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
  {{- with .Values.externalSecrets.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore.name }}
    kind: {{ .Values.externalSecrets.secretStore.kind | default "SecretStore" }}
  target:
    name: {{ include "supabase.fullname" . }}-storage-external-secret
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          {{- include "supabase.labels" . | nindent 10 }}
          app.kubernetes.io/component: storage
      data:
        # Database Configuration
        database-url: "{{ "{{" }} .databaseUrl {{ "}}" }}"
        jwt-secret: "{{ "{{" }} .jwtSecret {{ "}}" }}"
        anon-key: "{{ "{{" }} .anonKey {{ "}}" }}"
        service-key: "{{ "{{" }} .serviceKey {{ "}}" }}"

        # S3/MinIO Configuration
        s3-endpoint: "{{ "{{" }} .s3Endpoint {{ "}}" }}"
        s3-access-key-id: "{{ "{{" }} .s3AccessKeyId {{ "}}" }}"
        s3-secret-access-key: "{{ "{{" }} .s3SecretAccessKey {{ "}}" }}"
        s3-bucket: "{{ "{{" }} .s3Bucket {{ "}}" }}"
        s3-region: "{{ "{{" }} .s3Region {{ "}}" }}"

        # Storage API Configuration
        gotrue-url: "{{ "{{" }} .gotrueUrl {{ "}}" }}"
        imgproxy-url: "{{ "{{" }} .imgproxyUrl {{ "}}" }}"
        tenant-id: "{{ "{{" }} .tenantId {{ "}}" }}"

        {{- range $key, $value := .Values.externalSecrets.additionalData }}
        {{ $key }}: "{{ "{{" }} .{{ $value }} {{ "}}"}}"
        {{- end }}
  data:
    # Database secrets
    - secretKey: databaseUrl
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.databaseUrl.key }}
        {{- if .Values.externalSecrets.secrets.databaseUrl.property }}
        property: {{ .Values.externalSecrets.secrets.databaseUrl.property }}
        {{- end }}
    - secretKey: jwtSecret
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.jwtSecret.key }}
        {{- if .Values.externalSecrets.secrets.jwtSecret.property }}
        property: {{ .Values.externalSecrets.secrets.jwtSecret.property }}
        {{- end }}
    - secretKey: anonKey
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.anonKey.key }}
        {{- if .Values.externalSecrets.secrets.anonKey.property }}
        property: {{ .Values.externalSecrets.secrets.anonKey.property }}
        {{- end }}
    - secretKey: serviceKey
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.serviceKey.key }}
        {{- if .Values.externalSecrets.secrets.serviceKey.property }}
        property: {{ .Values.externalSecrets.secrets.serviceKey.property }}
        {{- end }}

    # S3 secrets
    - secretKey: s3Endpoint
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.s3Endpoint.key }}
        {{- if .Values.externalSecrets.secrets.s3Endpoint.property }}
        property: {{ .Values.externalSecrets.secrets.s3Endpoint.property }}
        {{- end }}
    - secretKey: s3AccessKeyId
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.s3AccessKeyId.key }}
        {{- if .Values.externalSecrets.secrets.s3AccessKeyId.property }}
        property: {{ .Values.externalSecrets.secrets.s3AccessKeyId.property }}
        {{- end }}
    - secretKey: s3SecretAccessKey
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.s3SecretAccessKey.key }}
        {{- if .Values.externalSecrets.secrets.s3SecretAccessKey.property }}
        property: {{ .Values.externalSecrets.secrets.s3SecretAccessKey.property }}
        {{- end }}
    - secretKey: s3Bucket
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.s3Bucket.key }}
        {{- if .Values.externalSecrets.secrets.s3Bucket.property }}
        property: {{ .Values.externalSecrets.secrets.s3Bucket.property }}
        {{- end }}
    - secretKey: s3Region
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.s3Region.key }}
        {{- if .Values.externalSecrets.secrets.s3Region.property }}
        property: {{ .Values.externalSecrets.secrets.s3Region.property }}
        {{- end }}

    # Service URLs
    - secretKey: gotrueUrl
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.gotrueUrl.key }}
        {{- if .Values.externalSecrets.secrets.gotrueUrl.property }}
        property: {{ .Values.externalSecrets.secrets.gotrueUrl.property }}
        {{- end }}
    - secretKey: imgproxyUrl
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.imgproxyUrl.key }}
        {{- if .Values.externalSecrets.secrets.imgproxyUrl.property }}
        property: {{ .Values.externalSecrets.secrets.imgproxyUrl.property }}
        {{- end }}
    - secretKey: tenantId
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.tenantId.key }}
        {{- if .Values.externalSecrets.secrets.tenantId.property }}
        property: {{ .Values.externalSecrets.secrets.tenantId.property }}
        {{- end }}

    {{- range $key, $secret := .Values.externalSecrets.additionalSecrets }}
    - secretKey: {{ $key }}
      remoteRef:
        key: {{ $secret.key }}
        {{- if $secret.property }}
        property: {{ $secret.property }}
        {{- end }}
    {{- end }}
{{- end }}
