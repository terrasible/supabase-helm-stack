{{- if and .Values.storage.enabled .Values.csi.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "supabase.fullname" . }}-storage-csi
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
  {{- with .Values.csi.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  provider: {{ .Values.csi.provider | default "azure" }}
  parameters:
    {{- if eq .Values.csi.provider "azure" }}
    keyvaultName: {{ .Values.csi.azure.keyvaultName }}
    tenantId: {{ .Values.csi.azure.tenantId }}
    {{- end }}
    {{- if eq .Values.csi.provider "aws" }}
    region: {{ .Values.csi.aws.region }}
    {{- end }}
    {{- if eq .Values.csi.provider "gcp" }}
    project_id: {{ .Values.csi.gcp.projectId }}
    {{- end }}
    objects: |
      array:
        # Database Configuration
        - |
          objectName: {{ .Values.csi.secrets.databaseUrl.objectName | default "supabase-database-url" }}
          objectType: secret
          objectVersion: {{ .Values.csi.secrets.databaseUrl.objectVersion | default "" }}
        - |
          objectName: {{ .Values.csi.secrets.jwtSecret.objectName | default "supabase-jwt-secret" }}
          objectType: secret
          objectVersion: {{ .Values.csi.secrets.jwtSecret.objectVersion | default "" }}
        - |
          objectName: {{ .Values.csi.secrets.anonKey.objectName | default "supabase-anon-key" }}
          objectType: secret
          objectVersion: {{ .Values.csi.secrets.anonKey.objectVersion | default "" }}
        - |
          objectName: {{ .Values.csi.secrets.serviceKey.objectName | default "supabase-service-key" }}
          objectType: secret
          objectVersion: {{ .Values.csi.secrets.serviceKey.objectVersion | default "" }}

        # S3/MinIO Configuration
        - |
          objectName: {{ .Values.csi.secrets.s3Endpoint.objectName | default "supabase-s3-endpoint" }}
          objectType: secret
          objectVersion: {{ .Values.csi.secrets.s3Endpoint.objectVersion | default "" }}
        - |
          objectName: {{ .Values.csi.secrets.s3AccessKeyId.objectName | default "supabase-s3-access-key-id" }}
          objectType: secret
          objectVersion: {{ .Values.csi.secrets.s3AccessKeyId.objectVersion | default "" }}
        - |
          objectName: {{ .Values.csi.secrets.s3SecretAccessKey.objectName | default "supabase-s3-secret-access-key" }}
          objectType: secret
          objectVersion: {{ .Values.csi.secrets.s3SecretAccessKey.objectVersion | default "" }}
        - |
          objectName: {{ .Values.csi.secrets.s3Bucket.objectName | default "supabase-s3-bucket" }}
          objectType: secret
          objectVersion: {{ .Values.csi.secrets.s3Bucket.objectVersion | default "" }}
        - |
          objectName: {{ .Values.csi.secrets.s3Region.objectName | default "supabase-s3-region" }}
          objectType: secret
          objectVersion: {{ .Values.csi.secrets.s3Region.objectVersion | default "" }}

        # Service URLs
        - |
          objectName: {{ .Values.csi.secrets.gotrueUrl.objectName | default "supabase-gotrue-url" }}
          objectType: secret
          objectVersion: {{ .Values.csi.secrets.gotrueUrl.objectVersion | default "" }}
        - |
          objectName: {{ .Values.csi.secrets.imgproxyUrl.objectName | default "supabase-imgproxy-url" }}
          objectType: secret
          objectVersion: {{ .Values.csi.secrets.imgproxyUrl.objectVersion | default "" }}
        - |
          objectName: {{ .Values.csi.secrets.tenantId.objectName | default "supabase-tenant-id" }}
          objectType: secret
          objectVersion: {{ .Values.csi.secrets.tenantId.objectVersion | default "" }}

        {{- range $key, $secret := .Values.csi.additionalSecrets }}
        - |
          objectName: {{ $secret.objectName }}
          objectType: secret
          objectVersion: {{ $secret.objectVersion | default "" }}
        {{- end }}
  secretObjects:
    - secretName: {{ include "supabase.fullname" . }}-storage-csi-secret
      type: Opaque
      data:
        # Database Configuration
        - objectName: {{ .Values.csi.secrets.databaseUrl.objectName | default "supabase-database-url" }}
          key: database-url
        - objectName: {{ .Values.csi.secrets.jwtSecret.objectName | default "supabase-jwt-secret" }}
          key: jwt-secret
        - objectName: {{ .Values.csi.secrets.anonKey.objectName | default "supabase-anon-key" }}
          key: anon-key
        - objectName: {{ .Values.csi.secrets.serviceKey.objectName | default "supabase-service-key" }}
          key: service-key

        # S3/MinIO Configuration
        - objectName: {{ .Values.csi.secrets.s3Endpoint.objectName | default "supabase-s3-endpoint" }}
          key: s3-endpoint
        - objectName: {{ .Values.csi.secrets.s3AccessKeyId.objectName | default "supabase-s3-access-key-id" }}
          key: s3-access-key-id
        - objectName: {{ .Values.csi.secrets.s3SecretAccessKey.objectName | default "supabase-s3-secret-access-key" }}
          key: s3-secret-access-key
        - objectName: {{ .Values.csi.secrets.s3Bucket.objectName | default "supabase-s3-bucket" }}
          key: s3-bucket
        - objectName: {{ .Values.csi.secrets.s3Region.objectName | default "supabase-s3-region" }}
          key: s3-region

        # Service URLs
        - objectName: {{ .Values.csi.secrets.gotrueUrl.objectName | default "supabase-gotrue-url" }}
          key: gotrue-url
        - objectName: {{ .Values.csi.secrets.imgproxyUrl.objectName | default "supabase-imgproxy-url" }}
          key: imgproxy-url
        - objectName: {{ .Values.csi.secrets.tenantId.objectName | default "supabase-tenant-id" }}
          key: tenant-id

        {{- range $key, $secret := .Values.csi.additionalSecrets }}
        - objectName: {{ $secret.objectName }}
          key: {{ $key }}
        {{- end }}
    {{- range $secretName, $secretConfig := .Values.csi.additionalSecretObjects }}
    - secretName: {{ $secretName }}
      type: {{ $secretConfig.type | default "Opaque" }}
      data:
        {{- range $secretConfig.data }}
        - objectName: {{ .objectName }}
          key: {{ .key }}
        {{- end }}
    {{- end }}
{{- end }}
