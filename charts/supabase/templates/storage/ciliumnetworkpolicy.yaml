{{- if and .Values.storage.enabled .Values.networkPolicy.enabled .Values.networkPolicy.cilium.enabled }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "supabase.fullname" . }}-storage
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
  {{- with .Values.networkPolicy.cilium.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  endpointSelector:
    matchLabels:
      {{- include "supabase.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: storage
  ingress:
    # Allow traffic from Kong Gateway (via Kong Operator)
    {{- if .Values.kongOperator.enabled }}
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": {{ .Values.kongOperator.serviceNamespace }}
            app: kong
    {{- end }}
      toPorts:
        - ports:
            - port: "{{ .Values.storage.service.port | default 5000 }}"
              protocol: TCP
    # Allow traffic from other Supabase components
    - fromEndpoints:
        - matchLabels:
            {{- include "supabase.selectorLabels" . | nindent 12 }}
      toPorts:
        - ports:
            - port: "{{ .Values.storage.service.port | default 5000 }}"
              protocol: TCP
    # Allow Prometheus scraping
    {{- if .Values.storage.serviceMonitor.enabled }}
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "{{ .Values.storage.serviceMonitor.port | default "metrics" }}"
              protocol: TCP
    {{- end }}
    {{- with .Values.networkPolicy.cilium.ingress.additionalRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # Allow DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Allow access to database
    - toEndpoints:
        - matchLabels:
            {{- include "supabase.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: db
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    {{- if .Values.global.externalDatabase.enabled }}
    # Allow access to external database
    - toFQDNs:
        - matchName: {{ .Values.global.externalDatabase.host | quote }}
      toPorts:
        - ports:
            - port: "{{ .Values.global.externalDatabase.port | default 5432 }}"
              protocol: TCP
    {{- end }}
    # Allow access to S3/MinIO
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: minio
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
    # Allow access to Auth service
    - toEndpoints:
        - matchLabels:
            {{- include "supabase.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: auth
      toPorts:
        - ports:
            - port: "{{ .Values.auth.service.port | default 9999 }}"
              protocol: TCP
    # Allow access to ImgProxy
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: imgproxy
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Allow HTTPS traffic
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Allow HTTP traffic
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
    {{- with .Values.networkPolicy.cilium.egress.additionalRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
