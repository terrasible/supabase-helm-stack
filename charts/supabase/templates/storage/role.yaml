{{- if and .Values.storage.enabled (and .Values.storage.rbac (and .Values.storage.rbac .Values.storage.rbac.create) .Values.storage.rbac.create) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "supabase.storage.fullname" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
rules:
  {{- toYaml .Values.storage.rbac.rules | nindent 2 }}
{{- end }}
