{{- if and .Values.storage.enabled .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "supabase.fullname" . }}-storage
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
  {{- with .Values.networkPolicy.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      {{- include "supabase.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: storage
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from Kong Gateway (via Kong Operator)
    {{- if .Values.kongOperator.enabled }}
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .Values.kongOperator.serviceNamespace }}
        - podSelector:
            matchLabels:
              app: kong
    {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.storage.service.port | default 5000 }}
    # Allow traffic from other Supabase components
    - from:
        - podSelector:
            matchLabels:
              {{- include "supabase.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.storage.service.port | default 5000 }}
    # Allow Prometheus scraping
    {{- if .Values.storage.serviceMonitor.enabled }}
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .Values.prometheus.namespace | default "monitoring" }}
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: {{ .Values.storage.serviceMonitor.port | default "metrics" }}
    {{- end }}
    {{- with .Values.networkPolicy.ingress.additionalRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow access to database
    - to:
        - podSelector:
            matchLabels:
              {{- include "supabase.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: db
      ports:
        - protocol: TCP
          port: 5432
    {{- if .Values.global.externalDatabase.enabled }}
    # Allow access to external database
    - to: []
      ports:
        - protocol: TCP
          port: {{ .Values.global.externalDatabase.port | default 5432 }}
    {{- end }}
    # Allow access to S3/MinIO
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: minio
      ports:
        - protocol: TCP
          port: 9000
    # Allow access to Auth service
    - to:
        - podSelector:
            matchLabels:
              {{- include "supabase.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: auth
      ports:
        - protocol: TCP
          port: {{ .Values.auth.service.port | default 9999 }}
    # Allow access to ImgProxy
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: imgproxy
      ports:
        - protocol: TCP
          port: 8080
    # Allow HTTPS traffic
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # Allow HTTP traffic
    - to: []
      ports:
        - protocol: TCP
          port: 80
    {{- with .Values.networkPolicy.egress.additionalRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
