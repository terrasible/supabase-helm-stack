{{- if and .Values.imgproxy.enabled (and .Values.imgproxy.serviceAccount .Values.imgproxy.serviceAccount.create) .Values.imgproxy.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "supabase.imgproxy.serviceAccountName" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
  {{- with .Values.imgproxy.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.imgproxy.serviceAccount.automountServiceAccountToken }}
{{- end }}
