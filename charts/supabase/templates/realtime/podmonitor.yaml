{{- if and .Values.realtime.enabled .Values.realtime.podMonitor .Values.realtime.podMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "supabase.fullname" . }}-realtime
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: realtime
    {{- with .Values.realtime.podMonitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.realtime.podMonitor.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.realtime.podMonitor.jobLabel }}
  jobLabel: {{ .Values.realtime.podMonitor.jobLabel }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "supabase.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: realtime
      {{- with .Values.realtime.podMonitor.selector }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
  podMetricsEndpoints:
    - port: {{ .Values.realtime.podMonitor.port | default "metrics" }}
      {{- if .Values.realtime.podMonitor.interval }}
      interval: {{ .Values.realtime.podMonitor.interval }}
      {{- end }}
      {{- if .Values.realtime.podMonitor.scrapeTimeout }}
      scrapeTimeout: {{ .Values.realtime.podMonitor.scrapeTimeout }}
      {{- end }}
      path: {{ .Values.realtime.podMonitor.path | default "/metrics" }}
      {{- if .Values.realtime.podMonitor.scheme }}
      scheme: {{ .Values.realtime.podMonitor.scheme }}
      {{- end }}
      {{- if .Values.realtime.podMonitor.tlsConfig }}
      tlsConfig:
        {{- toYaml .Values.realtime.podMonitor.tlsConfig | nindent 8 }}
      {{- end }}
      {{- if .Values.realtime.podMonitor.bearerTokenSecret }}
      bearerTokenSecret:
        {{- toYaml .Values.realtime.podMonitor.bearerTokenSecret | nindent 8 }}
      {{- end }}
      {{- if .Values.realtime.podMonitor.basicAuth }}
      basicAuth:
        {{- toYaml .Values.realtime.podMonitor.basicAuth | nindent 8 }}
      {{- end }}
      {{- if .Values.realtime.podMonitor.metricRelabelings }}
      metricRelabelings:
        {{- toYaml .Values.realtime.podMonitor.metricRelabelings | nindent 8 }}
      {{- end }}
      {{- if .Values.realtime.podMonitor.relabelings }}
      relabelings:
        {{- toYaml .Values.realtime.podMonitor.relabelings | nindent 8 }}
      {{- end }}
      {{- if .Values.realtime.podMonitor.proxyUrl }}
      proxyUrl: {{ .Values.realtime.podMonitor.proxyUrl }}
      {{- end }}
      {{- if .Values.realtime.podMonitor.honorLabels }}
      honorLabels: {{ .Values.realtime.podMonitor.honorLabels }}
      {{- end }}
      {{- if .Values.realtime.podMonitor.honorTimestamps }}
      honorTimestamps: {{ .Values.realtime.podMonitor.honorTimestamps }}
      {{- end }}
  {{- if .Values.realtime.podMonitor.podTargetLabels }}
  podTargetLabels:
    {{- toYaml .Values.realtime.podMonitor.podTargetLabels | nindent 4 }}
  {{- end }}
  {{- if .Values.realtime.podMonitor.sampleLimit }}
  sampleLimit: {{ .Values.realtime.podMonitor.sampleLimit }}
  {{- end }}
  {{- if .Values.realtime.podMonitor.targetLimit }}
  targetLimit: {{ .Values.realtime.podMonitor.targetLimit }}
  {{- end }}
  {{- if .Values.realtime.podMonitor.labelLimit }}
  labelLimit: {{ .Values.realtime.podMonitor.labelLimit }}
  {{- end }}
  {{- if .Values.realtime.podMonitor.labelNameLengthLimit }}
  labelNameLengthLimit: {{ .Values.realtime.podMonitor.labelNameLengthLimit }}
  {{- end }}
  {{- if .Values.realtime.podMonitor.labelValueLengthLimit }}
  labelValueLengthLimit: {{ .Values.realtime.podMonitor.labelValueLengthLimit }}
  {{- end }}
  {{- if .Values.realtime.podMonitor.namespaceSelector }}
  namespaceSelector:
    {{- toYaml .Values.realtime.podMonitor.namespaceSelector | nindent 4 }}
  {{- end }}
{{- end }}
