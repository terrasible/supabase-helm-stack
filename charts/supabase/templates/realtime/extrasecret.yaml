{{- if and .Values.realtime.enabled .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "supabase.fullname" . }}-realtime-external-secret
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: realtime
  {{- with .Values.externalSecrets.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore.name | default (printf "%s-secret-store" (include "supabase.fullname" .)) }}
    kind: {{ .Values.externalSecrets.secretStore.kind | default "SecretStore" }}
  target:
    name: {{ include "supabase.fullname" . }}-realtime-external-secret
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          {{- include "supabase.labels" . | nindent 10 }}
          app.kubernetes.io/component: realtime
      data:
        database-url: "postgresql://{{ `{{ .username }}` }}:{{ `{{ .password }}` }}@{{ include "supabase.database.host" . }}:5432/{{ .Values.legacySecret.db.database }}"
        jwt-secret: "{{ `{{ .jwt_secret }}` }}"
        anon-key: "{{ `{{ .anon_key }}` }}"
        service-key: "{{ `{{ .service_key }}` }}"
        secret-key-base: "{{ `{{ .secret_key_base }}` }}"
        db-host: "{{ include "supabase.database.host" . }}"
        db-port: "5432"
        db-name: "{{ .Values.legacySecret.db.database }}"
        db-user: "{{ `{{ .username }}` }}"
        db-password: "{{ `{{ .password }}` }}"
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.externalSecrets.realtime.database.usernameKey | default "supabase/realtime/db/username" }}
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecrets.realtime.database.passwordKey | default "supabase/realtime/db/password" }}
    - secretKey: jwt_secret
      remoteRef:
        key: {{ .Values.externalSecrets.realtime.jwt.secretKey | default "supabase/realtime/jwt/secret" }}
    - secretKey: anon_key
      remoteRef:
        key: {{ .Values.externalSecrets.realtime.jwt.anonKey | default "supabase/realtime/jwt/anon" }}
    - secretKey: service_key
      remoteRef:
        key: {{ .Values.externalSecrets.realtime.jwt.serviceKey | default "supabase/realtime/jwt/service" }}
    - secretKey: secret_key_base
      remoteRef:
        key: {{ .Values.externalSecrets.realtime.config.secretKeyBaseKey | default "supabase/realtime/config/secret-key-base" }}
    {{- if .Values.externalSecrets.realtime.additionalSecrets }}
    {{- range .Values.externalSecrets.realtime.additionalSecrets }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteRef.key }}
        {{- if .remoteRef.property }}
        property: {{ .remoteRef.property }}
        {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
