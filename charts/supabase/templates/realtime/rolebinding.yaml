{{- if and .Values.realtime.enabled (and .Values.realtime.rbac (and .Values.realtime.rbac .Values.realtime.rbac.create) .Values.realtime.rbac.create) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "supabase.realtime.fullname" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "supabase.realtime.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "supabase.realtime.fullname" . }}
{{- end }}
