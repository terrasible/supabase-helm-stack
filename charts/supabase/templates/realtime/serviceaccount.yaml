{{- if and .Values.realtime.enabled (and .Values.realtime.serviceAccount (and .Values.realtime.serviceAccount .Values.realtime.serviceAccount.create) .Values.realtime.serviceAccount.create) -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "supabase.realtime.serviceAccountName" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
  {{- with .Values.realtime.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if and .Values.realtime.serviceAccount.irsa .Values.realtime.serviceAccount.irsa.enabled }}
    eks.amazonaws.com/role-arn: {{ .Values.realtime.serviceAccount.irsa.roleArn }}
  {{- end }}
{{- end }}
