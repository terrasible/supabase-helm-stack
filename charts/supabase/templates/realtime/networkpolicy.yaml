{{- if and .Values.realtime.enabled (and .Values.realtime .Values.realtime.networkPolicy) .Values.realtime.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "supabase.realtime.fullname" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "supabase.realtime.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: {{ .Release.Namespace }}
    - podSelector:
        matchLabels:
          {{- include "supabase.labels" . | nindent 10 }}
    ports:
    - protocol: TCP
      port: 4000
  egress:
  - to: []
    ports: []
  {{- with .Values.realtime.networkPolicy.egressRules }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
