{{- if and .Values.realtime.enabled .Values.networkPolicy.enabled .Values.networkPolicy.cilium.enabled }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "supabase.fullname" . }}-realtime
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: realtime
spec:
  endpointSelector:
    matchLabels:
      {{- include "supabase.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: realtime
  ingress:
    # Allow traffic from Kong Gateway (via Kong Operator)
    {{- if .Values.kongOperator.enabled }}
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": {{ .Values.kongOperator.serviceNamespace }}
            app: kong
    {{- end }}
      toPorts:
        - ports:
            - port: "4000"
              protocol: TCP
    # Allow traffic from other Supabase components
    - fromEndpoints:
        - matchLabels:
            {{- include "supabase.selectorLabels" . | nindent 12 }}
      toPorts:
        - ports:
            - port: "4000"
              protocol: TCP
    # Allow Prometheus scraping
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "{{ .Values.realtime.service.metricsPort | default 9090 }}"
              protocol: TCP
    {{- if .Values.networkPolicy.cilium.ingress.additionalRules }}
    {{- toYaml .Values.networkPolicy.cilium.ingress.additionalRules | nindent 4 }}
    {{- end }}
  egress:
    # Allow DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Allow database connections
    - toEndpoints:
        - matchLabels:
            {{- include "supabase.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: postgresql
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Allow external database connections if using external DB
    {{- if .Values.postgresql.external.enabled }}
    - toFQDNs:
        - matchName: {{ .Values.postgresql.external.host | quote }}
      toPorts:
        - ports:
            - port: "{{ .Values.postgresql.external.port | default 5432 }}"
              protocol: TCP
    {{- end }}
    # Allow HTTPS traffic for external services
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Allow HTTP traffic for health checks and webhooks
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
    {{- if .Values.networkPolicy.cilium.egress.additionalRules }}
    {{- toYaml .Values.networkPolicy.cilium.egress.additionalRules | nindent 4 }}
    {{- end }}
{{- end }}
