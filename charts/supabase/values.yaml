    # External secrets configuration (strategy: external)
    external:
      enabled: false
      secretStore: ""
      remoteRefs:
        keyId: "supabase/s3/key-id"
        accessKey: "supabase/s3/access-key"

# PostgreSQL Database (Bitnami Chart)
# Official PostgreSQL chart configured to work with Supabase services.
postgresql:
  # Enable PostgreSQL provisioning via Bitnami chart
  enabled: true
  auth:
    enablePostgresUser: true
    postgresPassword: "supabase"
    username: "supabase"
    password: "supabase"
    database: "postgres"
  primary:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      requests:
        memory: "128Mi"
        cpu: "10m"
      limits:
        memory: "256Mi"
        cpu: "50m"
    initdb:
      scripts:
        init.sql: |
          -- Create Supabase specific users and schemas
          CREATE USER supabase_auth_admin WITH PASSWORD 'supabase';
          CREATE USER supabase_functions_admin WITH PASSWORD 'supabase';
          CREATE USER supabase_admin WITH PASSWORD 'supabase';
          CREATE SCHEMA IF NOT EXISTS _analytics;
          GRANT ALL ON SCHEMA _analytics TO supabase_admin;
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false

# Legacy db configuration (deprecated - use postgresql above)
db:
  # Enable database provisioning (deprecated - use postgresql.enabled)
  enabled: false
  image:
    repository: supabase/postgres
    pullPolicy: IfNotPresent
    tag: "latest"
  imagePullSecrets: []
  replicaCount: 1
  nameOverride: ""
  fullnameOverride: ""
  livenessProbe: {}
  readinessProbe: {}
  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""
  podAnnotations: {}
  podSecurityContext: {}
    # fsGroup: 2000
  securityContext: {}
    # capabilities:
    #   drop:
    #   - ALL
    # readOnlyRootFilesystem: true
    # runAsNonRoot: true
    # runAsUser: 1000
  service:
    type: ClusterIP
    port: 5432
  environment:
    POSTGRES_HOST: /var/run/postgresql
    PGPORT: "5432"
    POSTGRES_PORT: "5432"
    JWT_EXP: 3600
    # POSTGRES_HOST_AUTH_METHOD: md5
    # Enable SSL for postgres by specifying paths for mounted certificate key pair
    # POSTGRES_SSL_CERT: /path/to/ssl/server.crt
    # POSTGRES_SSL_KEY: /path/to/ssl/server.key
  # volumeMounts:
  #   - name: volume_name
  #     mountPath: /path/to/my/secret
  # volumes:
  #   - name: volume_name
  #     secret:
  #       defaultMode: 733
  #       secretName: my_secret
  #       items:
  #       - key: my_secret.txt
  #         path: name_of_file_in_container.txt
  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi
  persistence:
    enabled: true
    storageClassName: ""
    annotations: {}
    size: 8Gi
    accessModes:
      - ReadWriteOnce
    class: ""
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Additional migration scripts can be defined here
  config: {}

