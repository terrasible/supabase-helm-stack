# Kong Gateway Operator Configuration
# Kong is now managed by Kong Gateway Operator instead of embedded deployment
# See examples/kong-operator/ for Kong Operator setup instructions
kongOperator:
  # Enable Kong Operator integration
  enabled: false
  # Kong Gateway service name (created by Kong Operator)
  serviceName: "supabase-stack-kong-proxy"
  # Kong Gateway service namespace (where Kong Operator deploys Kong)
  serviceNamespace: "supabase"
  # Kong Gateway service port
  servicePort: 80
  # Kong Admin API configuration (for configuration management)
  adminApi:
    # Kong Admin API service name
    serviceName: "kong-admin"
    # Kong Admin API service port
    servicePort: 8001
  # Kong configuration for Supabase services
  config:
    # Enable automatic Kong configuration via KongIngress resources
    autoConfig: true
    # Kong plugins to enable for Supabase
    plugins:
      - "request-transformer"
      - "cors"
      - "key-auth"
      - "acl"
      - "basic-auth"
      - "rate-limiting"
    # CORS configuration for Supabase services
    cors:
      origins: "*"
      methods: "GET,HEAD,PUT,PATCH,POST,DELETE,OPTIONS"
      headers: "Accept,Authorization,Cache-Control,Content-Type,DNT,If-Modified-Since,Keep-Alive,Origin,User-Agent,X-Requested-With,apikey,x-client-info"
      credentials: true
    # Rate limiting configuration
    rateLimiting:
      requests: 1000
      window: 60

# Kong Gateway (Subchart Configuration)
# Traditional Kong deployment when Kong Operator is disabled
kong:
  # Enable Kong subchart (disable when using Kong Operator)
  enabled: true
  image:
    repository: kong
    tag: "3.0"
  environment:
    KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
    KONG_LOG_LEVEL: info
    KONG_PLUGINS: bundled
  # Kong configuration file
  dblessConfig:
    configMap: supabase-stack-kong-config
  # Service configuration
  proxy:
    enabled: true
    type: ClusterIP
    http:
      enabled: true
      servicePort: 8000
      containerPort: 8000
    tls:
      enabled: false
  admin:
    enabled: true
    type: ClusterIP
    http:
      enabled: true
      servicePort: 8001
      containerPort: 8001
  # Resources
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  # Autoscaling
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

