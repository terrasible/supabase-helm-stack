# File structure of values.yaml:
# |-- 1.  Global Production Settings
# |-- 2.  Database
# |-- 3.  Studio
# |-- 4.  Auth
# |-- 5.  Rest
# |-- 6.  Realtime
# |-- 7.  Meta
# |-- 8.  Storage
# |-- 9.  Image Proxy
# |-- 10. Kong
# |-- 11. Analytics
# |-- 12. Vector
# |-- 13. Functions
# |-- 14. Minio

# Global Production Settings
# Enable production-grade features across all services

# RBAC Configuration
rbac:
  create: true
  annotations: {}
  additionalRules: []

# Service Account Configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""
  imagePullSecrets: []
  automountServiceAccountToken: true

# Network Policy Configuration
networkPolicy:
  enabled: false
  ingress:
    namespaceSelector: {}
    podSelector: {}
    ports: []
  egress:
    namespaceSelector: {}
    podSelector: {}
    ports: []
  cilium:
    enabled: false
    ingress: []
    egress: []

# Pod Disruption Budget Configuration
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# Ingress Configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: supabase.local
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: supabase-kong
              port:
                number: 8000
  tls: []
  #  - secretName: supabase-tls
  #    hosts:
  #      - supabase.local

# Secret Management
secret:
  create: true
  type: Opaque
  annotations: {}
  data: {}
  stringData: {}
  additional: {}

# Service Monitor Configuration
serviceMonitor:
  enabled: false
  create: true
  labels: {}
  annotations: {}
  jobLabel: ""
  targetLabels: []
  podTargetLabels: []
  selector: {}
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics

# Pod Monitor Configuration
podMonitor:
  enabled: false
  create: true
  labels: {}
  annotations: {}
  jobLabel: ""
  podTargetLabels: []
  selector: {}
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics

# Prometheus Rules Configuration
prometheusRule:
  enabled: false
  labels: {}
  annotations: {}
  additionalRules: []
  additionalRuleGroups: []
  additionalPrometheusRules: {}
  customRules: {}

# Prometheus Configuration
prometheus:
  additionalScrapeConfigs: []
  additionalScrapeConfigsExternal:
    enabled: false
    targets: []
    scrapeInterval: 30s
    metricsPath: /metrics
    scheme: http
    basicAuth: {}
    tlsConfig: {}
  additionalAlertRelabelConfigs: []
  globalRelabelConfigs: []

# Alertmanager Configuration
alertmanager:
  additionalAlertRelabelConfigs: []
  additionalAlertmanagerConfigs: []
  customConfig:
    enabled: false
    global: {}
    route: {}
    inhibitRules: []
    receivers: []
  webhookConfigs: []

# Enhanced Secrets Management Configuration
# Supports three approaches: CSI drivers (Vault/AWS), External Secrets, and Kubernetes secrets
secrets:
  # Global secrets management strategy
  global:
    # Primary strategy: csi, external, or kubernetes
    strategy: "kubernetes"

    # CSI Driver Configuration (HashiCorp Vault, AWS Secrets Manager)
    csi:
      enabled: false
      # Provider: vault, aws, azure, gcp
      provider: "vault"
      # Vault specific configuration
      vault:
        address: "https://vault.example.com"
        role: "supabase"
        authPath: "auth/kubernetes"
        secretPath: "secret/data/supabase"
      # AWS Secrets Manager configuration
      aws:
        region: "us-west-2"
        secretsManagerEndpoint: ""
        roleArn: ""
      # Azure Key Vault configuration
      azure:
        keyvaultName: ""
        tenantId: ""
      # GCP Secret Manager configuration
      gcp:
        projectId: ""

    # External Secrets Operator Configuration
    external:
      enabled: false
      refreshInterval: "1h"
      secretStore:
        name: ""
        kind: "SecretStore"  # or ClusterSecretStore
        provider: {}
      clusterSecretStore:
        enabled: false
        provider: {}

    # Kubernetes native secrets configuration
    kubernetes:
      # Create secrets automatically from values
      create: true
      # Use existing secrets by reference
      existingSecrets: {}

  # Per-microservice secret overrides
  # Each service can override global strategy and provide specific configurations
  microservices:
    # Example structure - each service can override global settings
    # auth:
    #   strategy: "csi"  # Override global strategy
    #   csi:
    #     vault:
    #       secretPath: "secret/data/supabase/auth"
    # rest:
    #   strategy: "external"
    #   external:
    #     secretStore:
    #       name: "rest-secret-store"

# Legacy External Secrets Configuration (deprecated - use secrets.global.external)
externalSecrets:
  enabled: false
  secrets: []
  clusterSecretStore:
    enabled: false
    provider: {}
  secretStore:
    enabled: false
    provider: {}

# Legacy CSI Configuration (deprecated - use secrets.global.csi)
csi:
  enabled: false
  secrets: []
  storageClass:
    enabled: false
    provisioner: ""
    parameters: {}
    reclaimPolicy: Delete
    allowVolumeExpansion: true
    volumeBindingMode: WaitForFirstConsumer
    allowedTopologies: []
  volumeSnapshotClass:
    enabled: false
    driver: ""
    parameters: {}
    deletionPolicy: Delete

# Global resource defaults for production workloads
global:
  # Default resource requests and limits
  resources:
    requests:
      memory: "128Mi"
      cpu: "10m"
    limits:
      memory: "256Mi"
      cpu: "10m"
  # Default pod disruption budget settings
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  # Default autoscaling settings
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

# Legacy Secret Configuration (maintained for backward compatibility)
# For new deployments, consider using the enhanced secrets.global configuration above
legacySecret:
  # Global secret management strategy override
  # If not specified, uses secrets.global.strategy
  strategy: ""

  # jwt will be used to reference secret in multiple services:
  # Anon & Service key: Studio, Storage, Kong
  # JWT Secret: Analytics, Auth, Rest, Realtime, Storage
  jwt:
    # Hardcoded values (strategy: kubernetes)
    anonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0"
    serviceKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU"
    secret: "abcdefghijklmnopqrstuvwxyz123456789"

    # External secret reference (strategy: kubernetes with existing secret)
    secretRef: ""
    secretRefKey:
      anonKey: anonKey
      serviceKey: serviceKey
      secret: secret

    # CSI driver configuration (strategy: csi)
    csi:
      enabled: false
      secretPath: "supabase/jwt"
      keys:
        anonKey: "anon-key"
        serviceKey: "service-key"
        secret: "jwt-secret"

    # External secrets configuration (strategy: external)
    external:
      enabled: false
      secretStore: ""
      remoteRefs:
        anonKey: "supabase/jwt/anon-key"
        serviceKey: "supabase/jwt/service-key"
        secret: "supabase/jwt/secret"

  # database credentials
  # these fields must be provided even if using external database
  db:
    # Hardcoded values (strategy: kubernetes)
    username: "postgres"
    password: "supabase"
    database: "postgres"

    # External secret reference (strategy: kubernetes with existing secret)
    secretRef: ""
    secretRefKey:
      username: username
      password: password
      database: database

    # CSI driver configuration (strategy: csi)
    csi:
      enabled: false
      secretPath: "supabase/database"
      keys:
        username: "username"
        password: "password"
        database: "database"

    # External secrets configuration (strategy: external)
    external:
      enabled: false
      secretStore: ""
      remoteRefs:
        username: "supabase/db/username"
        password: "supabase/db/password"
        database: "supabase/db/database"

  # analytics Logflare API key
  analytics:
    # Hardcoded values (strategy: kubernetes)
    apiKey: "your-logflare-api-key-placeholder-change-in-production"

    # External secret reference (strategy: kubernetes with existing secret)
    secretRef: ""
    secretRefKey:
      apiKey: apiKey

    # CSI driver configuration (strategy: csi)
    csi:
      enabled: false
      secretPath: "supabase/analytics"
      keys:
        apiKey: "api-key"

    # External secrets configuration (strategy: external)
    external:
      enabled: false
      secretStore: ""
      remoteRefs:
        apiKey: "supabase/analytics/api-key"

  # smtp will be used to reference secret including smtp credentials
  smtp:
    # Hardcoded values (strategy: kubernetes)
    username: "noreply@supabase.local"
    password: "smtp-password"

    # External secret reference (strategy: kubernetes with existing secret)
    secretRef: ""
    secretRefKey:
      username: username
      password: password

    # CSI driver configuration (strategy: csi)
    csi:
      enabled: false
      secretPath: "supabase/smtp"
      keys:
        username: "username"
        password: "password"

    # External secrets configuration (strategy: external)
    external:
      enabled: false
      secretStore: ""
      remoteRefs:
        username: "supabase/smtp/username"
        password: "supabase/smtp/password"

  # secret used to access the studio dashboard
  # leave it empty to disable dashboard authentication
  dashboard:
    # Hardcoded values (strategy: kubernetes)
    username: ""
    password: ""

    # External secret reference (strategy: kubernetes with existing secret)
    secretRef: ""
    secretRefKey:
      username: username
      password: password

    # CSI driver configuration (strategy: csi)
    csi:
      enabled: false
      secretPath: "supabase/dashboard"
      keys:
        username: "username"
        password: "password"

    # External secrets configuration (strategy: external)
    external:
      enabled: false
      secretStore: ""
      remoteRefs:
        username: "supabase/dashboard/username"
        password: "supabase/dashboard/password"

  # S3 credentials for storage object bucket
  s3:
    # Hardcoded values (strategy: kubernetes)
    keyId: ""
    accessKey: ""

    # External secret reference (strategy: kubernetes with existing secret)
    secretRef: ""
    secretRefKey:
      keyId: keyId
      accessKey: accessKey

    # CSI driver configuration (strategy: csi)
    csi:
      enabled: false
      secretPath: "supabase/s3"
      keys:
        keyId: "key-id"
