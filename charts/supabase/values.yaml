# Vector (Official Vector Chart)
# Vector for log aggregation and processing
vector:
  # Enable Vector provisioning via official chart
  enabled: true
  # Vector role configuration
  role: "Agent"
  # Custom Vector configuration for Supabase
  customConfig:
    data_dir: "/vector-data-dir"
    api:
      enabled: true
      address: "127.0.0.1:8686"
      playground: false
    sources:
      supabase_logs:
        type: "kubernetes_logs"
        namespace_labels:
          - "supabase"
    transforms:
      parse_logs:
        type: "remap"
        inputs: ["supabase_logs"]
        source: |
          . = parse_json!(.message)
    sinks:
      console:
        type: "console"
        inputs: ["parse_logs"]
        encoding:
          codec: "json"
  # Resource configuration
  resources:
    requests:
      memory: "128Mi"
      cpu: "10m"
    limits:
      memory: "256Mi"
      cpu: "10m"
  # Production-grade settings
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  # Service configuration
  service:
    enabled: true
    type: ClusterIP
    ports:
      - name: api
        port: 8686
        protocol: TCP
  # Metrics and monitoring
  serviceMonitor:
    enabled: false
  # RBAC for log collection
  rbac:
    enabled: true
  # Persistence for buffering
  persistence:
    enabled: true
    size: "10Gi"
    storageClassName: ""

