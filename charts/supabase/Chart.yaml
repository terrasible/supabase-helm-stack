apiVersion: v2
name: supabase
description: The open source Firebase alternative.

# Keywords for Artifact Hub
keywords:
  - supabase
  - firebase
  - backend
  - database
  - auth
  - storage
  - realtime
  - postgresql
  - kubernetes

# Home page and sources
home: https://supabase.com
sources:
  - https://github.com/supabase/supabase
  - https://github.com/your-org/supabase-helm-stack

# Maintainers
maintainers:
  - name: Bibek Rauniyar
    email: bibek@example.com

# Annotations for Artifact Hub
annotations:
  artifacthub.io/category: database
  artifacthub.io/license: MIT
  artifacthub.io/prerelease: "false"
  artifacthub.io/operator: "false"
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/changes: |
    - Added comprehensive enterprise features
    - Implemented Kong Operator integration
    - Enhanced security with RBAC and network policies
    - Added monitoring with Prometheus and Grafana
    - Upgraded chart dependencies
  artifacthub.io/links: |
    - name: Chart Source
      url: https://github.com/your-org/supabase-helm-stack
    - name: Supabase Documentation
      url: https://supabase.com/docs

# A chart can be either an 'application' or a 'library' chart.
#
# Application charts are a collection of templates that can be packaged into versioned archives
# to be deployed.
#
# Library charts provide useful utilities or functions for the chart developer. They're included as
# a dependency of application charts to inject those utilities and functions into the rendering
# pipeline. Library charts do not define any templates and therefore cannot be deployed.
type: application

# This is the chart version. This version number should be incremented each time you make changes
# to the chart and its templates, including the app version.
# Versions are expected to follow Semantic Versioning (https://semver.org/)
version: 0.1.3

# This is the version number of the application being deployed. This version number should be
# incremented each time you make changes to the application. Versions are not expected to
# follow Semantic Versioning. They should reflect the version the application is using.
# It is recommended to use it with quotes.
# Not used because too difficult to follow correctly
# appVersion: "1.16.0"

# A URL to an SVG or PNG image to be used as an icon
icon: https://avatars.githubusercontent.com/u/54469796?s=280&v=4

# Dependencies for external charts
dependencies:
  # Database
  - name: postgresql
    version: "16.7.27"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
    tags:
      - database
  - name: postgresql-ha
    version: "16.3.2"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql-ha.enabled
    tags:
      - database-ha
  - name: redis
    version: "22.0.7"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
    tags:
      - cache
  # Storage
  - name: minio
    version: "17.0.21"
    repository: "https://charts.bitnami.com/bitnami"
    condition: minio.enabled
    tags:
      - storage
  # API Gateway
  - name: kong
    version: "2.13.1"
    repository: "https://charts.konghq.com"
    condition: kong.enabled
    tags:
      - gateway
  # Monitoring
  - name: prometheus
    version: "2.1.23"
    repository: "https://charts.bitnami.com/bitnami"
    condition: prometheus.enabled
    tags:
      - monitoring
  - name: grafana
    version: "12.1.8"
    repository: "https://charts.bitnami.com/bitnami"
    condition: grafana.enabled
    tags:
      - monitoring
  # Logging
  - name: vector
    version: "0.22.0"
    repository: "https://helm.vector.dev"
    condition: vector.enabled
    tags:
      - logging
  # Additional Services
  - name: ingress-nginx
    version: "4.5.2"
    repository: "https://kubernetes.github.io/ingress-nginx"
    condition: ingress-nginx.enabled
    tags:
      - ingress
  - name: cert-manager
    version: "1.11.0"
    repository: "https://charts.jetstack.io"
    condition: cert-manager.enabled
    tags:
      - certificates
