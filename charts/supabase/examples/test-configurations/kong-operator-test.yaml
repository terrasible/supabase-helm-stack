# Kong Operator integration test configuration
# This configuration tests Supabase with Kong Operator instead of embedded Kong

# Global configuration
global:
  storageClass: "standard"

# PostgreSQL - Standard configuration
postgresql:
  enabled: true
  auth:
    postgresPassword: "kong-test-postgres-password"
    database: "supabase"
  primary:
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 1Gi
        cpu: 500m

# Auth service
auth:
  enabled: true
  replicaCount: 2
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 300m
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# REST API
rest:
  enabled: true
  replicaCount: 2
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 300m
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70

# Storage service
storage:
  enabled: true
  replicaCount: 2
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 300m
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# Realtime service
realtime:
  enabled: true
  replicaCount: 2
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 300m
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# Studio service
studio:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

# Meta service
meta:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

# Functions service
functions:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 300m

# Kong Operator - ENABLED for this test
kongOperator:
  enabled: true
  serviceName: "kong-gateway"
  serviceNamespace: "kong-system"
  servicePort: 80
  adminPort: 8001

  # Network policy configuration for Kong Operator
  networkPolicy:
    enabled: true
    allowedNamespaces:
      - "supabase"
      - "kong-system"
      - "default"

  # Kong Gateway configuration
  gateway:
    image:
      repository: "kong"
      tag: "3.4"

    # Service configuration
    service:
      type: LoadBalancer
      ports:
        - name: proxy
          port: 80
          targetPort: 8000
          protocol: TCP
        - name: proxy-ssl
          port: 443
          targetPort: 8443
          protocol: TCP

    # Admin API configuration
    admin:
      enabled: true
      service:
        type: ClusterIP
        port: 8001

    # Environment variables for Kong Gateway
    env:
      database: "off"
      declarative_config: "/kong/declarative/kong.yml"
      proxy_access_log: "/dev/stdout"
      admin_access_log: "/dev/stdout"
      admin_error_log: "/dev/stderr"
      proxy_error_log: "/dev/stderr"

    # Resources for Kong Gateway
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 1Gi
        cpu: 500m

    # Autoscaling for Kong Gateway
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70

  # Kong Ingress Controller configuration
  ingressController:
    enabled: true
    image:
      repository: "kong/kubernetes-ingress-controller"
      tag: "2.12"

    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 300m

    env:
      kong_admin_url: "http://kong-gateway-admin:8001"
      kong_admin_tls_skip_verify: "true"
      publish_service: "kong-system/kong-gateway-proxy"

# Kong Gateway (embedded) - DISABLED when using Kong Operator
kong:
  enabled: false

# MinIO for storage testing
minio:
  enabled: true
  mode: standalone
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 300m

# Monitoring - Enabled for testing
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: "30s"

# Security - Enhanced for Kong Operator testing
rbac:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "services", "endpoints", "configmaps"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["apps"]
      resources: ["deployments"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["configuration.konghq.com"]
      resources: ["*"]
      verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

serviceAccount:
  create: true
  annotations:
    "kong.konghq.com/service-account": "true"

networkPolicy:
  enabled: true
  cilium:
    enabled: false  # Use standard NetworkPolicy for this test

  # Allow traffic from Kong namespace
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: "kong-system"
      ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 5432
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: "supabase"
      ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 8000

  # Allow outbound traffic to Kong and external services
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: "kong-system"
    - to: []
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80

podSecurityPolicy:
  enabled: true

# Autoscaling - Enabled for testing
autoscaling:
  enabled: true

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Secrets for testing
secret:
  jwt:
    secret: "kong-operator-test-jwt-token-with-at-least-32-characters-long"
    anonKey: >
      eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1rb25nLXRlc3QiLCJyb2xlIjoiYW5vbiIsImV4cCI6MTk4MzgxMjk5Nn0.kong-test-anon-key
    serviceKey: >
      eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1rb25nLXRlc3QiLCJyb2xlIjoic2VydmljZV9yb2xlIiwiZXhwIjoxOTgzODEyOTk2fQ.kong-test-service-key
  db:
    password: "kong-test-postgres-password"

# Ingress - Using Kong Ingress Controller
ingress:
  enabled: true
  className: "kong"
  annotations:
    konghq.com/strip-path: "true"
    konghq.com/preserve-host: "true"
    konghq.com/protocols: "http,https"
  hosts:
    - host: supabase-kong-test.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: supabase-kong-tls
      hosts:
        - supabase-kong-test.local

# Service configuration
service:
  type: ClusterIP
  annotations:
    konghq.com/service-upstream: "true"

# Kong-specific service configurations
kongServices:
  # REST API service
  rest:
    enabled: true
    host: "supabase-rest"
    port: 3000
    protocol: "http"
    path: "/rest"

  # Auth service
  auth:
    enabled: true
    host: "supabase-auth"
    port: 9999
    protocol: "http"
    path: "/auth"

  # Storage service
  storage:
    enabled: true
    host: "supabase-storage"
    port: 5000
    protocol: "http"
    path: "/storage"

  # Realtime service
  realtime:
    enabled: true
    host: "supabase-realtime"
    port: 4000
    protocol: "http"
    path: "/realtime"

  # Studio service
  studio:
    enabled: true
    host: "supabase-studio"
    port: 3000
    protocol: "http"
    path: "/"

# Test-specific annotations
annotations:
  "helm.sh/test": "true"
  "test.supabase.io/configuration": "kong-operator"
  "test.supabase.io/gateway": "kong-operator"
  "test.supabase.io/features": "kong-integration"
