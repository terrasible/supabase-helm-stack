# Minimal Supabase configuration for testing basic functionality
# This configuration enables only essential services with minimal resources

# Basic configuration
global:
  storageClass: "standard"

# PostgreSQL - Essential database
postgresql:
  enabled: true
  auth:
    postgresPassword: "test-postgres-password"
    database: "supabase"
  primary:
    persistence:
      enabled: true
      size: 1Gi
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m

# Auth service - Essential for authentication
auth:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m
  autoscaling:
    enabled: false

# REST API - Essential for API access
rest:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m
  autoscaling:
    enabled: false

# Meta service - Essential for metadata
meta:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

# Kong Gateway - Essential for API gateway
kong:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  autoscaling:
    enabled: false

# Disable optional services for minimal setup
storage:
  enabled: false

realtime:
  enabled: false

studio:
  enabled: false

functions:
  enabled: false

minio:
  enabled: false

# Kong Operator - Disabled for minimal setup
kongOperator:
  enabled: false

# Monitoring - Disabled for minimal setup
monitoring:
  enabled: false

# Security - Basic settings
rbac:
  create: true

serviceAccount:
  create: true

networkPolicy:
  enabled: false

podSecurityPolicy:
  enabled: false

# Autoscaling - Disabled for minimal setup
autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

# Secrets - Use default values for testing
secret:
  jwt:
    secret: "your-super-secret-jwt-token-with-at-least-32-characters-long"
    anonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0"
    serviceKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU"
  db:
    password: "test-postgres-password"

# Ingress - Disabled for minimal setup
ingress:
  enabled: false

# Service configuration
service:
  type: ClusterIP

# Test-specific annotations
annotations:
  "helm.sh/test": "true"
  "test.supabase.io/configuration": "minimal"
