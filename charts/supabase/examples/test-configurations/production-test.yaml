# Production-ready Supabase configuration for comprehensive testing
# This configuration enables all services with production-grade settings

# Global configuration
global:
  storageClass: "fast-ssd"
  imageRegistry: "docker.io"

# PostgreSQL - Production configuration
postgresql:
  enabled: true
  auth:
    postgresPassword: "secure-postgres-password-change-me"
    database: "supabase"
  primary:
    persistence:
      enabled: true
      size: 20Gi
      storageClass: "fast-ssd"
    resources:
      requests:
        memory: 2Gi
        cpu: 1000m
      limits:
        memory: 4Gi
        cpu: 2000m
  metrics:
    enabled: true
    service:
      port: 9187
    serviceMonitor:
      enabled: true

# Auth service - Production configuration
auth:
  enabled: true
  replicaCount: 3
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 500m
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: true
    minAvailable: 2

# REST API - Production configuration
rest:
  enabled: true
  replicaCount: 3
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 500m
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
    targetCPUUtilizationPercentage: 70
  podDisruptionBudget:
    enabled: true
    minAvailable: 2

# Storage service - Production configuration
storage:
  enabled: true
  replicaCount: 2
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 500m
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

# Realtime service - Production configuration
realtime:
  enabled: true
  replicaCount: 2
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 500m
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

# Studio service - Production configuration
studio:
  enabled: true
  replicaCount: 2
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 300m
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# Meta service - Production configuration
meta:
  enabled: true
  replicaCount: 2
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 300m
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# Functions service - Production configuration
functions:
  enabled: true
  replicaCount: 2
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 500m
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70

# Kong Operator - Production configuration
kongOperator:
  enabled: true
  serviceName: "kong-gateway"
  serviceNamespace: "kong-system"
  servicePort: 80
  adminPort: 8001
  networkPolicy:
    enabled: true
    allowedNamespaces:
      - "supabase"
      - "kong-system"
      - "monitoring"

# Kong Gateway (legacy) - Disabled when using Kong Operator
kong:
  enabled: false

# MinIO - Production configuration
minio:
  enabled: true
  mode: distributed
  replicas: 4
  persistence:
    enabled: true
    size: 50Gi
    storageClass: "fast-ssd"
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 2Gi
      cpu: 1000m
  metrics:
    serviceMonitor:
      enabled: true

# Monitoring - Full production monitoring
monitoring:
  enabled: true
  prometheus:
    enabled: true
    retention: "30d"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: "fast-ssd"
          resources:
            requests:
              storage: 50Gi
  grafana:
    enabled: true
    persistence:
      enabled: true
      size: 10Gi
  serviceMonitor:
    enabled: true
    interval: "30s"
    scrapeTimeout: "10s"

# Security - Production security settings
rbac:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "services", "endpoints"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["apps"]
      resources: ["deployments", "replicasets"]
      verbs: ["get", "list", "watch"]

serviceAccount:
  create: true
  annotations:
    "eks.amazonaws.com/role-arn": "arn:aws:iam::123456789012:role/supabase-service-role"

networkPolicy:
  enabled: true
  cilium:
    enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: "kong-system"
      ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 8000
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              name: "kube-system"

podSecurityPolicy:
  enabled: true
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000

# Autoscaling - Production autoscaling
autoscaling:
  enabled: true
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60

podDisruptionBudget:
  enabled: true
  minAvailable: "50%"

# Secrets - Production secrets (should be managed externally)
secret:
  jwt:
    secret: "your-super-secret-jwt-token-with-at-least-32-characters-long-production"
    anonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1wcm9kIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.example-anon-key"
    serviceKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1wcm9kIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.example-service-key"
  db:
    password: "secure-postgres-password-change-me"
  smtp:
    username: "smtp-user"
    password: "smtp-password"

# Ingress - Production ingress with TLS
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  hosts:
    - host: api.supabase.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: supabase-tls
      hosts:
        - api.supabase.example.com

# Service configuration
service:
  type: ClusterIP
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"

# Resource quotas
resourceQuota:
  enabled: true
  hard:
    requests.cpu: "10"
    requests.memory: "20Gi"
    limits.cpu: "20"
    limits.memory: "40Gi"
    persistentvolumeclaims: "10"

# Test-specific annotations
annotations:
  "helm.sh/test": "true"
  "test.supabase.io/configuration": "production"
  "test.supabase.io/features": "all-enabled"
