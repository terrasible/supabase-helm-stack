# Example: External Secret References Configuration
# This approach uses existing secrets in your Kubernetes cluster

# Global configuration
global:
  storageClass: "standard"

# Database configuration
postgresql:
  enabled: true
  auth:
    database: "postgres"
    # Database credentials will come from external secret

# Secrets configuration - all external references # pragma: allowlist secret
secret: # pragma: allowlist secret
  # Database secrets (external reference) # pragma: allowlist secret
  db:
    secretRef: "my-supabase-db-secret" # pragma: allowlist secret
    secretRefKey:
      username: "db-username"      # Key in the external secret # pragma: allowlist secret
      password: "db-password"      # Key in the external secret # pragma: allowlist secret
      database: "db-name"          # Key in the external secret # pragma: allowlist secret

  # JWT secrets (external reference) # pragma: allowlist secret
  jwt:
    secretRef: "my-supabase-jwt-secret" # pragma: allowlist secret
    secretRefKey:
      anonKey: "anon-key"          # Key in the external secret # pragma: allowlist secret
      serviceKey: "service-key"    # Key in the external secret # pragma: allowlist secret
      secret: "jwt-signing-secret" # Key in the external secret # pragma: allowlist secret

  # SMTP secrets (external reference) # pragma: allowlist secret
  smtp:
    secretRef: "my-supabase-smtp-secret" # pragma: allowlist secret
    secretRefKey:
      username: "smtp-user"        # Key in the external secret # pragma: allowlist secret
      password: "smtp-pass"        # Key in the external secret # pragma: allowlist secret

  # Dashboard secrets (external reference) # pragma: allowlist secret
  dashboard:
    secretRef: "my-supabase-dashboard-secret" # pragma: allowlist secret
    secretRefKey:
      username: "dashboard-user"   # Key in the external secret # pragma: allowlist secret
      password: "dashboard-pass"   # Key in the external secret # pragma: allowlist secret

  # Analytics secrets (external reference) # pragma: allowlist secret
  analytics:
    secretRef: "my-supabase-analytics-secret" # pragma: allowlist secret
    secretRefKey:
      apiKey: "logflare-api-key"   # Key in the external secret # pragma: allowlist secret

# Service configurations
auth:
  enabled: true
  image:
    tag: "v2.143.0"
  # SMTP configuration for auth service
  env:
    GOTRUE_SMTP_HOST: "smtp.gmail.com"
    GOTRUE_SMTP_PORT: "587"
    GOTRUE_SMTP_SENDER_NAME: "Supabase"

rest:
  enabled: true
  image:
    tag: "v12.0.1"

realtime:
  enabled: true
  image:
    tag: "v2.25.50"

storage:
  enabled: true
  image:
    tag: "v0.46.4"
  # Storage configuration
  env:
    STORAGE_BACKEND: "s3"
    AWS_REGION: "us-east-1"
    AWS_S3_BUCKET: "my-supabase-storage"

kong:
  enabled: true
  image:
    tag: "2.8.1"

analytics:
  enabled: true
  image:
    tag: "1.4.0"

meta:
  enabled: true
  image:
    tag: "v0.80.0"

studio:
  enabled: true
  image:
    tag: "20240326-5e5586d"

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  hosts:
    - host: supabase.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: supabase-tls
      hosts:
        - supabase.example.com

# Resource limits
resources:
  auth:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
  rest:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
  realtime:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
  storage:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi

# Monitoring and observability
serviceMonitor:
  enabled: true
  labels:
    prometheus: kube-prometheus

# Pod disruption budgets for high availability
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Network policies for security
networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000

---
# Example commands to create the external secrets:
#
# kubectl create secret generic my-supabase-db-secret \
#   --from-literal=db-username=postgres \
#   --from-literal=db-password=your-secure-db-password \
#   --from-literal=db-name=postgres
#
# kubectl create secret generic my-supabase-jwt-secret \
#   --from-literal=anon-key=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9... \
#   --from-literal=service-key=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9... \
#   --from-literal=jwt-signing-secret=your-super-secret-jwt-token-with-at-least-32-characters-long
#
# kubectl create secret generic my-supabase-smtp-secret \
#   --from-literal=smtp-user=your-email@gmail.com \
#   --from-literal=smtp-pass=your-app-password
#
# kubectl create secret generic my-supabase-dashboard-secret \
#   --from-literal=dashboard-user=admin \
#   --from-literal=dashboard-pass=your-secure-dashboard-password
#
# kubectl create secret generic my-supabase-analytics-secret \
#   --from-literal=logflare-api-key=your-logflare-api-key
