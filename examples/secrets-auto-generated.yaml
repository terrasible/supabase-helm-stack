# Example: Auto-generated Secrets Configuration
# This is the default and simplest approach where the chart generates all secrets automatically

# Global configuration
global:
  storageClass: "standard"

# Database configuration
postgresql:
  enabled: true
  auth:
    # Database credentials will be auto-generated
    database: "postgres"

# Secrets configuration - all auto-generated
secret:
  # Database secrets (auto-generated)
  db:
    # No secretRef specified - chart will generate:
    # Secret name: <release-name>-supabase-db
    # Keys: username, password, database

  # JWT secrets (auto-generated)
  jwt:
    # No secretRef specified - chart will generate:
    # Secret name: <release-name>-supabase-jwt
    # Keys: anonKey, serviceKey, secret

  # SMTP secrets (auto-generated)
  smtp:
    # No secretRef specified - chart will generate:
    # Secret name: <release-name>-supabase-smtp
    # Keys: username, password

  # Dashboard secrets (auto-generated)
  dashboard:
    # No secretRef specified - chart will generate:
    # Secret name: <release-name>-supabase-dashboard
    # Keys: username, password

  # Analytics secrets (auto-generated)
  analytics:
    # No secretRef specified - chart will generate:
    # Secret name: <release-name>-supabase-analytics
    # Keys: apiKey

# Service configurations
auth:
  enabled: true
  image:
    tag: "v2.143.0"

rest:
  enabled: true
  image:
    tag: "v12.0.1"

realtime:
  enabled: true
  image:
    tag: "v2.25.50"

storage:
  enabled: true
  image:
    tag: "v0.46.4"

kong:
  enabled: true
  image:
    tag: "2.8.1"

analytics:
  enabled: true
  image:
    tag: "1.4.0"

meta:
  enabled: true
  image:
    tag: "v0.80.0"

studio:
  enabled: true
  image:
    tag: "20240326-5e5586d"

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: supabase.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: supabase-tls
      hosts:
        - supabase.example.com

# Resource limits
resources:
  auth:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  rest:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  realtime:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  storage:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
