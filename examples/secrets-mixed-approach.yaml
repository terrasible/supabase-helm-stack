# Example: Mixed Secrets Management Approach
# This example demonstrates using different secrets management strategies for different services
# based on security requirements and operational preferences

# Global configuration
global:
  storageClass: "gp3"

# Database configuration
postgresql:
  enabled: true
  auth:
    database: "postgres"

# Mixed secrets configuration
secret:
  # Database secrets - Use External Secrets Operator (highest security)
  # Critical production database credentials managed externally
  db:
    secretRef: "supabase-db-secret"  # Managed by External Secrets Operator
    secretRefKey:
      username: "username"
      password: "password"
      database: "database"

  # JWT secrets - Use external secret reference (high security)
  # JWT keys are sensitive and should be managed externally
  jwt:
    secretRef: "my-jwt-secret"       # Pre-existing Kubernetes secret
    secretRefKey:
      anonKey: "anon-key"
      serviceKey: "service-key"
      secret: "jwt-secret"

  # SMTP secrets - Use auto-generated (medium security)
  # SMTP credentials can be auto-generated for development/staging
  smtp: {}
  # No secretRef specified - chart will auto-generate

  # Dashboard secrets - Use external secret reference (medium security)
  # Dashboard access should be controlled but can use K8s secrets
  dashboard:
    secretRef: "my-dashboard-secret"
    secretRefKey:
      username: "admin-user"
      password: "admin-pass"

  # Analytics secrets - Use auto-generated (low security)
  # Analytics API key can be auto-generated for non-critical environments
  analytics: {}
  # No secretRef specified - chart will auto-generate

# External Secrets Operator configuration (only for database)
externalSecrets:
  enabled: true

  secretStore:
    name: "vault-backend"
    kind: "SecretStore"

  # Only database secrets managed by External Secrets Operator
  db:
    enabled: true
    secretName: "supabase-db-secret"
    refreshInterval: "1h"
    data:
      - secretKey: username
        remoteRef:
          key: "production/supabase/database"
          property: "username"
      - secretKey: password
        remoteRef:
          key: "production/supabase/database"
          property: "password"
      - secretKey: database
        remoteRef:
          key: "production/supabase/database"
          property: "database"

  # Other services disabled - using different approaches
  jwt:
    enabled: false
  smtp:
    enabled: false
  dashboard:
    enabled: false
  analytics:
    enabled: false

# Service configurations
auth:
  enabled: true
  image:
    tag: "v2.143.0"
  env:
    GOTRUE_SMTP_HOST: "smtp.gmail.com"
    GOTRUE_SMTP_PORT: "587"
    GOTRUE_SMTP_SENDER_NAME: "MyApp"
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi

rest:
  enabled: true
  image:
    tag: "v12.0.1"
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi

realtime:
  enabled: true
  image:
    tag: "v2.25.50"
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

storage:
  enabled: true
  image:
    tag: "v0.46.4"
  env:
    STORAGE_BACKEND: "file"  # Using file backend for simplicity
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

kong:
  enabled: true
  image:
    tag: "2.8.1"
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

analytics:
  enabled: true
  image:
    tag: "1.4.0"
  resources:
    limits:
      cpu: 300m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

meta:
  enabled: true
  image:
    tag: "v0.80.0"
  resources:
    limits:
      cpu: 300m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

studio:
  enabled: true
  image:
    tag: "20240326-5e5586d"
  resources:
    limits:
      cpu: 300m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"  # Using staging for this example
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  hosts:
    - host: supabase-staging.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: supabase-staging-tls
      hosts:
        - supabase-staging.example.com

# Moderate availability configuration
replicaCount:
  auth: 2
  rest: 2
  realtime: 1
  storage: 1
  kong: 2

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Basic monitoring
serviceMonitor:
  enabled: true
  labels:
    prometheus: kube-prometheus

# Security configurations
networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

---
# Setup Instructions:
#
# 1. Create the external JWT secret:
# kubectl create secret generic my-jwt-secret \
#   --from-literal=anon-key=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9... \
#   --from-literal=service-key=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9... \
#   --from-literal=jwt-secret=your-super-secret-jwt-token-with-at-least-32-characters-long
#
# 2. Create the external dashboard secret:
# kubectl create secret generic my-dashboard-secret \
#   --from-literal=admin-user=admin \
#   --from-literal=admin-pass=your-secure-dashboard-password
#
# 3. Configure External Secrets Operator SecretStore:
# apiVersion: external-secrets.io/v1beta1
# kind: SecretStore
# metadata:
#   name: vault-backend
#   namespace: supabase
# spec:
#   provider:
#     vault:
#       server: "https://vault.example.com"
#       path: "secret"
#       version: "v2"
#       auth:
#         kubernetes:
#           mountPath: "kubernetes"
#           role: "supabase-role"
#           serviceAccountRef:
#             name: "external-secrets-sa"
#
# 4. Store database credentials in Vault at:
# production/supabase/database:
#   - username: postgres
#   - password: super-secure-production-password
#   - database: postgres
#
# 5. Deploy with:
# helm install supabase ./charts/supabase -f examples/secrets-mixed-approach.yaml
#
# This approach provides:
# - Maximum security for database credentials (External Secrets Operator + Vault)
# - High security for JWT tokens (Kubernetes secrets)
# - Convenience for SMTP and analytics (auto-generated)
# - Controlled access for dashboard (Kubernetes secrets)
