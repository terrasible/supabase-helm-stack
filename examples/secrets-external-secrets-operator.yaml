# Example: External Secrets Operator Configuration
# This approach integrates with External Secrets Operator for advanced secret management

# Global configuration
global:
  storageClass: "gp3"

# Database configuration
postgresql:
  enabled: true
  auth:
    database: "postgres"
    # Database credentials will come from External Secrets Operator

# External Secrets Operator configuration
externalSecrets:
  enabled: true

  # Global settings for all external secrets
  secretStore:
    name: "vault-backend"          # Name of your SecretStore/ClusterSecretStore
    kind: "SecretStore"            # SecretStore or ClusterSecretStore

  # Refresh interval for all secrets
  refreshInterval: "1h"

  # Database secrets from external system
  db:
    enabled: true
    secretName: "supabase-db-secret"
    data:
      - secretKey: username
        remoteRef:
          key: "supabase/database"
          property: "username"
      - secretKey: password
        remoteRef:
          key: "supabase/database"
          property: "password"
      - secretKey: database
        remoteRef:
          key: "supabase/database"
          property: "database"

  # JWT secrets from external system
  jwt:
    enabled: true
    secretName: "supabase-jwt-secret"
    data:
      - secretKey: anonKey
        remoteRef:
          key: "supabase/jwt"
          property: "anonKey"
      - secretKey: serviceKey
        remoteRef:
          key: "supabase/jwt"
          property: "serviceKey"
      - secretKey: secret
        remoteRef:
          key: "supabase/jwt"
          property: "signingSecret"

  # SMTP secrets from external system
  smtp:
    enabled: true
    secretName: "supabase-smtp-secret"
    data:
      - secretKey: username
        remoteRef:
          key: "supabase/smtp"
          property: "username"
      - secretKey: password
        remoteRef:
          key: "supabase/smtp"
          property: "password"

  # Dashboard secrets from external system
  dashboard:
    enabled: true
    secretName: "supabase-dashboard-secret"
    data:
      - secretKey: username
        remoteRef:
          key: "supabase/dashboard"
          property: "username"
      - secretKey: password
        remoteRef:
          key: "supabase/dashboard"
          property: "password"

  # Analytics secrets from external system
  analytics:
    enabled: true
    secretName: "supabase-analytics-secret"
    data:
      - secretKey: apiKey
        remoteRef:
          key: "supabase/analytics"
          property: "logflareApiKey"

# Secrets configuration - reference External Secrets Operator managed secrets
secret:
  # Database secrets (managed by External Secrets Operator)
  db:
    secretRef: "supabase-db-secret"
    secretRefKey:
      username: "username"
      password: "password"
      database: "database"

  # JWT secrets (managed by External Secrets Operator)
  jwt:
    secretRef: "supabase-jwt-secret"
    secretRefKey:
      anonKey: "anonKey"
      serviceKey: "serviceKey"
      secret: "secret"

  # SMTP secrets (managed by External Secrets Operator)
  smtp:
    secretRef: "supabase-smtp-secret"
    secretRefKey:
      username: "username"
      password: "password"

  # Dashboard secrets (managed by External Secrets Operator)
  dashboard:
    secretRef: "supabase-dashboard-secret"
    secretRefKey:
      username: "username"
      password: "password"

  # Analytics secrets (managed by External Secrets Operator)
  analytics:
    secretRef: "supabase-analytics-secret"
    secretRefKey:
      apiKey: "apiKey"

# Service configurations
auth:
  enabled: true
  image:
    tag: "v2.143.0"
  env:
    GOTRUE_SMTP_HOST: "smtp.gmail.com"
    GOTRUE_SMTP_PORT: "587"
    GOTRUE_SMTP_SENDER_NAME: "Supabase Production"
    GOTRUE_RATE_LIMIT_EMAIL_SENT: "100"
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi

rest:
  enabled: true
  image:
    tag: "v12.0.1"
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi

realtime:
  enabled: true
  image:
    tag: "v2.25.50"
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi

storage:
  enabled: true
  image:
    tag: "v0.46.4"
  env:
    STORAGE_BACKEND: "s3"
    AWS_REGION: "us-east-1"
    AWS_S3_BUCKET: "my-production-supabase-storage"
    STORAGE_FILE_SIZE_LIMIT: "52428800"  # 50MB
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi

kong:
  enabled: true
  image:
    tag: "2.8.1"
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi

analytics:
  enabled: true
  image:
    tag: "1.4.0"
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

meta:
  enabled: true
  image:
    tag: "v0.80.0"
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

studio:
  enabled: true
  image:
    tag: "20240326-5e5586d"
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Ingress configuration for production
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
  hosts:
    - host: api.mycompany.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: supabase-production-tls
      hosts:
        - api.mycompany.com

# High availability configuration
replicaCount:
  auth: 3
  rest: 3
  realtime: 2
  storage: 2
  kong: 3

# Pod disruption budgets
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Horizontal Pod Autoscaler
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Network policies for security
networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 9090  # Metrics port

# Service monitoring
serviceMonitor:
  enabled: true
  labels:
    prometheus: kube-prometheus
  interval: 30s
  scrapeTimeout: 10s

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

---
