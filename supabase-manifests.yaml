apiVersion: v1
kind: ConfigMap
metadata:
  name: supabase-stack-kong-config
  labels:
    helm.sh/chart: supabase-0.1.3
    app.kubernetes.io/name: supabase
    app.kubernetes.io/instance: supabase-stack
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: kong
data:
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    services:
      - name: auth-service
        url: http://supabase-stack-auth:9999
        routes:
          - name: auth-route
            paths:
              - /auth/v1
            strip_path: false
            plugins:
              - name: cors
                config:
                  origins:
                    - "*"
                  methods:
                    - GET
                    - HEAD
                    - PUT
                    - PATCH
                    - POST
                    - DELETE
                    - OPTIONS
                  headers:
                    - Accept
                    - Authorization
                    - Cache-Control
                    - Content-Type
                    - DNT
                    - If-Modified-Since
                    - Keep-Alive
                    - Origin
                    - User-Agent
                    - X-Requested-With
                    - apikey
                    - x-client-info
                  credentials: true

      - name: rest-service
        url: http://supabase-stack-rest:3000
        routes:
          - name: rest-route
            paths:
              - /rest/v1
            strip_path: false
            plugins:
